<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASNP NATPRO10 Event Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#FFD700;--orange:#FF8C00;--dark:#0a0a1a;--panel:rgba(0,0,0,0.86);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Press Start 2P',cursive;background:var(--dark);overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}
        .screen{position:fixed;inset:0;display:none;justify-content:center;align-items:center;flex-direction:column;}
        .screen.active{display:flex;}
        /* TITLE */
        #title-screen{background:linear-gradient(180deg,#87CEEB 0%,#4a90c4 55%,#1e5f74 100%);cursor:pointer;}
        #title-canvas{position:absolute;inset:0;width:100%;height:100%;}
        .title-content{position:relative;z-index:10;text-align:center;padding:24px;}
        .game-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(17px,5.2vw,44px);color:var(--gold);line-height:1.35;letter-spacing:2px;text-shadow:0 0 24px rgba(255,215,0,.55),4px 4px 0 #8B4513,-2px -2px 0 #FF6B35;animation:titlePulse 2.5s ease-in-out infinite;}
        .game-sub{font-size:clamp(9px,2.2vw,16px);color:#98FB98;margin-top:10px;text-shadow:2px 2px 0 #1a5c1a;}
        @keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
        .touch-text{font-size:clamp(8px,2vw,13px);color:#fff;margin-top:52px;text-shadow:2px 2px 0 #333;animation:blink 1s step-start infinite;}
        @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
        .snd-btn{position:absolute;top:16px;right:16px;font-size:22px;cursor:pointer;z-index:100;background:rgba(0,0,0,.52);padding:8px 11px;border-radius:8px;border:2px solid var(--gold);}
        .credit{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;font-size:clamp(7px,1.6vw,10px);color:rgba(255,255,255,0.65);text-shadow:1px 1px 0 rgba(0,0,0,0.5);letter-spacing:1px;white-space:nowrap;}
        /* EMAIL */
        #email-screen{background:linear-gradient(135deg,#0a0a1a 0%,#0f2340 60%,#0a3060 100%);}
        .email-box{background:var(--panel);border:3px solid var(--gold);padding:36px 30px;text-align:center;max-width:420px;width:93%;box-shadow:0 0 40px rgba(255,215,0,.12);}
        .email-box h2{font-size:clamp(13px,3.5vw,20px);color:var(--gold);margin-bottom:8px;}
        .email-box p{font-size:9px;color:#98FB98;line-height:2.3;margin-bottom:26px;}
        .pix-input{font-family:'Press Start 2P',cursive;font-size:11px;padding:13px 11px;width:100%;background:#050510;border:2px solid #3a6080;color:#fff;text-align:center;margin-bottom:16px;outline:none;}
        .pix-input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.28);}
        .pix-input::placeholder{color:#444;}
        .pix-btn{font-family:'Press Start 2P',cursive;font-size:clamp(10px,2.5vw,13px);padding:14px 28px;width:100%;background:linear-gradient(180deg,#FF7A35 0%,#D32F2F 100%);border:3px solid #8B1A1A;color:#fff;cursor:pointer;text-shadow:2px 2px 0 #333;transition:all .1s;}
        .pix-btn:hover{filter:brightness(1.14);transform:scale(1.02);}
        .pix-btn:active{transform:scale(.97);}
        .err{font-size:9px;color:#ff6b6b;margin-top:11px;min-height:16px;}
        /* GAME */
        #game-screen{background:#87CEEB;}
        #game-canvas{position:absolute;inset:0;width:100%;height:100%;}
        .hud{position:absolute;top:0;left:0;right:0;padding:13px 18px;z-index:10;display:flex;justify-content:center;gap:28px;}
        .hud-panel{background:rgba(0,0,0,.72);border:2px solid var(--gold);padding:9px 18px;text-align:center;}
        .hud-lbl{font-size:8px;color:#98FB98;display:block;margin-bottom:3px;}
        .hud-val{font-size:clamp(14px,3.8vw,24px);color:var(--gold);text-shadow:2px 2px 0 #8B4513;}
        #cntdwn{position:absolute;inset:0;z-index:20;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.42);pointer-events:none;}
        #cntdwn-n{font-family:'Orbitron',sans-serif;font-weight:900;font-size:min(25vw,180px);color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,.8);animation:cPop .7s ease-out forwards;}
        @keyframes cPop{0%{transform:scale(2);opacity:0}30%{transform:scale(1);opacity:1}80%{transform:scale(1);opacity:1}100%{transform:scale(.6);opacity:0}}
        /* RANKING */
        #ranking-screen{background:linear-gradient(135deg,#0a0a1a 0%,#0f2340 60%,#0a3060 100%);overflow-y:auto;padding:20px 0;}
        .rank-wrap{text-align:center;padding:20px;max-width:520px;width:96%;margin:auto;}
        .rank-wrap h2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(15px,4vw,28px);color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.45);margin-bottom:6px;}
        .final-box{background:var(--panel);border:3px solid var(--orange);padding:16px;margin:14px 0;display:flex;flex-direction:column;gap:7px;}
        .final-box .lbl{font-size:9px;color:#98FB98;}
        .final-box .val{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(28px,7.5vw,50px);color:var(--gold);text-shadow:3px 3px 0 #8B4513;}
        .rank-board{background:var(--panel);border:3px solid var(--gold);padding:18px;margin-bottom:16px;}
        .rank-board h3{font-size:clamp(9px,2.3vw,13px);color:var(--gold);margin-bottom:14px;}
        .rank-item{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px dashed #2a2a3a;font-size:clamp(7px,1.8vw,10px);color:#fff;}
        .rank-item:last-child{border-bottom:none;}
        .rank-item.me{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.38);padding:9px 6px;}
        .rank-item .pos{color:var(--gold);min-width:28px;}
        .rank-item .em{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 10px;color:#98FB98;}
        .rank-item .sc{color:var(--orange);min-width:52px;text-align:right;}
        .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
        .btn-row .pix-btn{width:auto;flex:1;min-width:130px;font-size:9px;padding:12px 14px;}
        .btn-dl{font-family:'Press Start 2P',cursive;font-size:9px;padding:12px 14px;flex:1;min-width:130px;background:linear-gradient(180deg,#27AE60 0%,#1a7a40 100%);border:3px solid #0f5028;color:#fff;cursor:pointer;text-shadow:1px 1px 0 #333;transition:all .1s;}
        .btn-dl:hover{filter:brightness(1.14);}
        .score-pop{position:absolute;font-family:'Press Start 2P',cursive;font-size:18px;color:var(--gold);text-shadow:2px 2px 0 #8B4513;pointer-events:none;animation:sPop .9s ease-out forwards;z-index:50;}
        @keyframes sPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
        .msg-pop{position:absolute;font-family:'Press Start 2P',cursive;font-size:clamp(11px,2.8vw,16px);color:#FF6B6B;text-shadow:2px 2px 0 #333;pointer-events:none;animation:sPop 1s ease-out forwards;z-index:50;}
    </style>
</head>
<body>
<div id="title-screen" class="screen active">
    <canvas id="title-canvas"></canvas>
    <div class="title-content">
        <h1 class="game-title">ASNP NATPRO10<br>Event Game</h1>
        <p class="game-sub">in JEJU Island 🍊</p>
        <p class="touch-text">TOUCH TO START</p>
    </div>
    <p class="credit">Made by H.Y.Kim</p>
    <div class="snd-btn" id="snd-btn">🔊</div>
</div>
<div id="email-screen" class="screen">
    <div class="email-box">
        <h2>ENTER EMAIL</h2>
        <p>게임 결과 저장을 위해<br>이메일을 입력해주세요</p>
        <input type="email" id="email-input" class="pix-input" placeholder="your@email.com" autocomplete="email">
        <button id="start-btn" class="pix-btn">▶ START GAME</button>
        <p class="err" id="email-err"></p>
    </div>
</div>
<div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>
    <div class="hud">
        <div class="hud-panel"><span class="hud-lbl">SCORE</span><span class="hud-val" id="score">0</span></div>
        <div class="hud-panel"><span class="hud-lbl">BEST</span><span class="hud-val" id="best">0</span></div>
    </div>
    <div id="cntdwn"><span id="cntdwn-n">3</span></div>
</div>
<div id="ranking-screen" class="screen">
    <div class="rank-wrap">
        <h2>GAME OVER</h2>
        <div class="final-box"><span class="lbl">YOUR SCORE</span><span class="val" id="final-score">0</span></div>
        <div class="rank-board">
            <h3>🏆 TOP 10 RANKING 🏆</h3>
            <div id="rank-list"></div>
        </div>
        <div class="btn-row">
            <button id="restart-btn" class="pix-btn">▶ PLAY AGAIN</button>
            <button id="dl-btn" class="btn-dl">📥 EXCEL 저장</button>
        </div>
    </div>
</div>

<script>
/* ══ AUDIO ══ */
const sfx=(()=>{
    let ctx=null, muted=false;
    let bgmNodes=[], bgmPlaying=false, bgmLoop=null;
    let currentTrack=0; // 0=Daft Punk, 1=TRON

    const init=()=>{if(ctx)return;try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}};
    const resume=()=>{if(ctx?.state==='suspended')ctx.resume();};

    const tone=(freq,type,dur,vol=.1,delay=0)=>{
        if(!ctx||muted)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=type;o.frequency.value=freq;
        const t=ctx.currentTime+delay;
        g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
        o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);
    };

    // ══════════════════════════════════════════
    // BGM 1: DAFT PUNK 스타일
    // 반복적인 하우스 리듬 + 펑키 신스 리프
    // Around The World / Harder Better 느낌
    // ══════════════════════════════════════════
    const DAFT_LEAD = [
        // 메인 신스 리프 (4마디 반복)
        {f:440,d:125},{f:440,d:125},{f:587,d:125},{f:440,d:125},
        {f:370,d:125},{f:440,d:125},{f:493,d:125},{f:440,d:125},
        {f:440,d:125},{f:523,d:125},{f:440,d:125},{f:370,d:125},
        {f:329,d:125},{f:370,d:125},{f:440,d:250},{f:0,d:125},
        // 두 번째 리프
        {f:587,d:125},{f:587,d:125},{f:659,d:125},{f:587,d:125},
        {f:523,d:125},{f:587,d:125},{f:659,d:125},{f:587,d:125},
        {f:523,d:125},{f:493,d:125},{f:440,d:125},{f:493,d:125},
        {f:523,d:250},{f:440,d:125},{f:370,d:125},{f:0,d:125},
        // 세 번째 리프 (변형)
        {f:440,d:125},{f:493,d:125},{f:523,d:125},{f:587,d:125},
        {f:659,d:125},{f:587,d:125},{f:523,d:125},{f:493,d:125},
        {f:440,d:250},{f:370,d:125},{f:329,d:125},{f:370,d:125},
        {f:440,d:500},{f:0,d:125},{f:0,d:125},{f:0,d:125},
    ];
    const DAFT_BASS = [
        // 4온음 펌핑 베이스 (4 on the floor)
        {f:110,d:250},{f:110,d:250},{f:130,d:250},{f:110,d:250},
        {f:110,d:250},{f:110,d:250},{f:130,d:250},{f:147,d:250},
        {f:110,d:250},{f:110,d:250},{f:130,d:250},{f:110,d:250},
        {f:110,d:250},{f:110,d:250},{f:147,d:250},{f:130,d:250},
        {f:110,d:250},{f:110,d:250},{f:130,d:250},{f:110,d:250},
        {f:110,d:250},{f:110,d:250},{f:130,d:250},{f:147,d:250},
        {f:110,d:250},{f:130,d:250},{f:147,d:250},{f:110,d:250},
        {f:130,d:250},{f:110,d:250},{f:130,d:250},{f:110,d:500},
    ];
    const DAFT_KICK = [
        // 킥 패턴 (4/4박자 하우스)
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
        {f:80,d:100},{f:0,d:150},{f:80,d:80},{f:0,d:170},
    ];

    // ══════════════════════════════════════════
    // BGM 2: TRON Legacy 스타일 (Daft Punk 작곡)
    // 어둡고 전자적인 신스 + 느린 아르페지오
    // Derezzed / The Grid 느낌
    // ══════════════════════════════════════════
    const TRON_LEAD = [
        // 메인 테마 — 어둡고 반복적인 아르페지오
        {f:220,d:166},{f:277,d:166},{f:330,d:166},
        {f:277,d:166},{f:220,d:166},{f:185,d:166},
        {f:220,d:166},{f:277,d:166},{f:370,d:166},
        {f:330,d:166},{f:277,d:166},{f:220,d:166},
        // 두 번째 구절
        {f:185,d:166},{f:220,d:166},{f:277,d:166},
        {f:220,d:166},{f:185,d:166},{f:164,d:166},
        {f:185,d:166},{f:220,d:166},{f:277,d:166},
        {f:330,d:166},{f:277,d:166},{f:220,d:500},
        // 세 번째 구절 (고음 상승)
        {f:440,d:200},{f:494,d:200},{f:523,d:200},
        {f:494,d:200},{f:440,d:200},{f:370,d:200},
        {f:330,d:200},{f:370,d:200},{f:440,d:200},
        {f:370,d:200},{f:330,d:200},{f:277,d:600},
        // 네 번째 구절 (하강)
        {f:330,d:200},{f:277,d:200},{f:220,d:200},
        {f:247,d:200},{f:220,d:200},{f:196,d:200},
        {f:220,d:200},{f:247,d:200},{f:220,d:200},
        {f:196,d:200},{f:185,d:200},{f:164,d:800},
    ];
    const TRON_PAD = [
        // 신스 패드 (긴 드론음 — 분위기 형성)
        {f:110,d:500},{f:0,d:0},{f:138,d:500},{f:0,d:0},
        {f:110,d:500},{f:0,d:0},{f:123,d:500},{f:0,d:0},
        {f:110,d:500},{f:0,d:0},{f:130,d:500},{f:0,d:0},
        {f:110,d:500},{f:0,d:0},{f:123,d:1000},{f:0,d:0},
        {f:92,d:500},{f:0,d:0},{f:110,d:500},{f:0,d:0},
        {f:92,d:500},{f:0,d:0},{f:103,d:500},{f:0,d:0},
        {f:92,d:500},{f:0,d:0},{f:110,d:500},{f:0,d:0},
        {f:92,d:500},{f:0,d:0},{f:110,d:1000},{f:0,d:0},
    ];
    const TRON_PULSE = [
        // 반복적인 전자 펄스 리듬 (16분음표)
        {f:164,d:125},{f:0,d:125},{f:0,d:125},{f:164,d:125},
        {f:0,d:125},{f:164,d:125},{f:0,d:125},{f:0,d:125},
        {f:164,d:125},{f:0,d:125},{f:164,d:125},{f:0,d:125},
        {f:0,d:125},{f:0,d:125},{f:164,d:125},{f:0,d:125},
        {f:164,d:125},{f:0,d:125},{f:0,d:125},{f:164,d:125},
        {f:0,d:125},{f:164,d:125},{f:0,d:125},{f:164,d:125},
        {f:0,d:125},{f:164,d:125},{f:0,d:125},{f:0,d:125},
        {f:164,d:125},{f:0,d:125},{f:164,d:250},{f:0,d:125},
    ];

    // ── 노트 플레이어 ──
    function _playNote(freq,type,dur,vol,when){
        if(!ctx||muted||freq<=0)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=type;o.frequency.value=freq;
        g.gain.setValueAtTime(vol,when);
        g.gain.exponentialRampToValueAtTime(0.001,when+dur/1000*0.88);
        o.connect(g);g.connect(ctx.destination);
        o.start(when);o.stop(when+dur/1000);
        bgmNodes.push(o);
    }

    function _scheduleBGM(){
        if(!ctx||muted||!bgmPlaying)return;
        const base=ctx.currentTime+0.05;

        if(currentTrack===0){
            // ── Daft Punk 스타일 ──
            let t=base;
            DAFT_LEAD.forEach(n=>{_playNote(n.f,'square',n.d,.07,t);t+=n.d/1000;});
            let tb=base;
            DAFT_BASS.forEach(n=>{_playNote(n.f,'sawtooth',n.d,.09,tb);tb+=n.d/1000;});
            let tk=base;
            DAFT_KICK.forEach(n=>{_playNote(n.f,'square',n.d,.055,tk);tk+=n.d/1000;});
            const totalMs=DAFT_LEAD.reduce((s,n)=>s+n.d,0);
            bgmLoop=setTimeout(_scheduleBGM, totalMs-80);
        } else {
            // ── TRON 스타일 ──
            let t=base;
            TRON_LEAD.forEach(n=>{_playNote(n.f,'sawtooth',n.d,.065,t);t+=n.d/1000;});
            let tp=base;
            TRON_PAD.forEach(n=>{_playNote(n.f,'triangle',n.d,.04,tp);tp+=n.d/1000;});
            let tu=base;
            TRON_PULSE.forEach(n=>{_playNote(n.f,'square',n.d,.038,tu);tu+=n.d/1000;});
            const totalMs=TRON_LEAD.reduce((s,n)=>s+n.d,0);
            bgmLoop=setTimeout(_scheduleBGM, totalMs-80);
        }
    }

    function startBGM(){
        if(bgmPlaying||muted)return;
        // 게임 시작마다 랜덤으로 트랙 선택
        currentTrack=Math.random()<0.5?0:1;
        bgmPlaying=true;
        _scheduleBGM();
    }
    function stopBGM(){
        bgmPlaying=false;
        clearTimeout(bgmLoop);
        bgmNodes.forEach(o=>{try{o.stop();}catch(e){}});
        bgmNodes=[];
    }

    return{
        init,resume,startBGM,stopBGM,
        jump(){tone(420,'triangle',.09,.1);},
        collect(){tone(587,'square',.05,.12);tone(784,'square',.05,.1,.06);tone(988,'square',.1,.1,.12);},
        land(){tone(200,'triangle',.06,.06);},
        die(){[392,330,262,196].forEach((f,i)=>tone(f,'sawtooth',.25,.18,i*.15));},
        toggleMute(){
            muted=!muted;
            if(muted) stopBGM();
            return muted;
        }
    };
})();

/* ══ TITLE BG ══ */
class TitleBG{
    constructor(cv){
        this.cv=cv;this.cx=cv.getContext('2d');this.t=0;this.id=null;
        this.clouds=[
            ...[...Array(4)].map(()=>({x:Math.random()*2000,y:30+Math.random()*60,w:35+Math.random()*30,s:.15+Math.random()*.1,layer:0,alpha:.5})),
            ...[...Array(3)].map(()=>({x:Math.random()*2000,y:65+Math.random()*70,w:60+Math.random()*45,s:.3+Math.random()*.18,layer:1,alpha:.7})),
            ...[...Array(3)].map(()=>({x:Math.random()*2000,y:120+Math.random()*50,w:75+Math.random()*55,s:.45+Math.random()*.22,layer:2,alpha:.82})),
        ];
        window.addEventListener('resize',()=>this._resize());this._resize();
    }
    _resize(){this.cv.width=window.innerWidth;this.cv.height=window.innerHeight;this.gY=this.cv.height*.68;}
    draw(){
        const cx=this.cx,W=this.cv.width,H=this.cv.height;
        this.t+=.018;
        const sg=cx.createLinearGradient(0,0,0,H);
        sg.addColorStop(0,'#87CEEB');sg.addColorStop(.45,'#4a90c4');sg.addColorStop(1,'#1e5f74');
        cx.fillStyle=sg;cx.fillRect(0,0,W,H);
        cx.fillStyle='#FFD700';cx.beginPath();cx.arc(W-90,80,46,0,Math.PI*2);cx.fill();
        cx.strokeStyle='rgba(255,215,0,.5)';cx.lineWidth=3;

                cx.fillStyle='rgba(180,205,225,.28)';cx.beginPath();cx.ellipse(c.x+c.w*.4,c.y+c.w*.17,c.w*.38,c.w*.09,0,0,Math.PI);cx.fill();

    _dol(cx,x,y,s){cx.save();cx.translate(x,y);cx.scale(s,s);cx.fillStyle='#5a5a5a';cx.fillRect(-14,18,28,36);cx.fillStyle='#6b6b6b';cx.beginPath();cx.ellipse(0,8,18,22,0,0,Math.PI*2);cx.fill();cx.fillStyle='#222';cx.fillRect(-20,-16,40,10);cx.fillRect(-10,-24,20,9);cx.fillStyle='#1a1a1a';cx.fillRect(-9,2,6,6);cx.fillRect(3,2,6,6);cx.restore();}

/* ══ GAME ══ */
class PlatformGame{
    constructor(cv){
        this.cv=cv;this.cx=cv.getContext('2d');
        this.onGameOver=null;
        this._tapH=this._tap.bind(this);
        this._keyH=e=>{if(e.code==='Space'||e.key===' '){e.preventDefault();this._tap();}};
        window.addEventListener('resize',()=>this._resize());
        this._resize();
    }

    // 점프 물리 기준값 사전 계산 — gap 생성 시 활용
    _calcJumpMetrics(){
        // ✅ dt정규화 후 실효 중력 = grav * 1.0 (60fps 기준 s=1)
        const jpow=16, grav=0.50;
        this._airFrames=(jpow*2)/grav;           // 체공 프레임 ≈64 (60fps 기준)
        this._maxJumpDist=this._airFrames*3.1;   // 초기 스크롤속도 기준 최대 이동
        this._safeGapMax=this._maxJumpDist*0.50;
    }

    _resize(){
        this.W=window.innerWidth||document.documentElement.clientWidth;
        this.H=window.innerHeight||document.documentElement.clientHeight;
        this.cv.width=this.W;this.cv.height=this.H;
        this.baseY=this.H*.76;
        this.pH=20;
        this.pW=44;this.pHt=58;
        this._calcJumpMetrics();
    }

    reset(){
        this.score=0;this.dead=false;this.bgT=0;
        this.scroll=5.3;this.scrollMax=10.3; // ✅ × 1.2배 추가 증가
        this.dist=0;
        this.gameTimeSec=0;     // 게임 경과 시간(초)
        this.giantSpawned={t2:false,t5:false,t10:false}; // 거대 한라봉 등장 여부
        // 점수 기반 이벤트 플래그
        this.scoreEvents={mola150:false, king200:false, firework300:false, pinkDol500:false, sunset800:false, night1000:false, volcano1200:false};
        this.fireworks=[];   // 불꽃놀이 파티클
        this.fireworkActive=false;
        this._fwTimer=0;
        this.pinkDolphins=false;
        // 하늘 변화 관련
        this.stars=this._initStars();
        this.lavaBlobs=[];
        this._lavaTimer=0;
        this._hallTimer=0;  // 주기적 한라봉 보장 타이머

        this.player={
            // ✅ 플레이어를 화면 왼쪽 26%로 — 다음 플랫폼 미리 보임
            x:this.W*.26, y:0,
            vy:0, onGround:true,
            // ✅ 점프력 강화 + 중력 완화 → 체공시간 증가 → 더 멀리 이동 가능
            jpow:-16, grav:0.50, maxFall:18,
            jc:0, maxJ:2
        };

        this.platforms=[];
        this.items=[];
        this.enemies=[];
        this.particles=[];
        this.dolphins=this._initDolphins();
        this.rays=this._initRays();
        this.molas=this._initMolas();
        // 구름 3레이어 — 높이·속도·크기 다르게
        this.clouds=[
            // 원경 구름 (작고 느림)
            ...[...Array(4)].map(()=>({x:Math.random()*this.W*1.5,y:this.H*.06+Math.random()*this.H*.08,w:35+Math.random()*30,s:.18+Math.random()*.1,layer:0,alpha:.55})),
            // 중경 구름 (중간)
            ...[...Array(4)].map(()=>({x:Math.random()*this.W*1.5,y:this.H*.12+Math.random()*this.H*.1,w:55+Math.random()*45,s:.32+Math.random()*.18,layer:1,alpha:.72})),
            // 근경 구름 (크고 빠름)
            ...[...Array(3)].map(()=>({x:Math.random()*this.W*1.5,y:this.H*.18+Math.random()*this.H*.08,w:80+Math.random()*60,s:.52+Math.random()*.25,layer:2,alpha:.85})),
        ];

        this._buildStart();
    }

    /* ─── 1. 초반 플랫폼: 플레이어가 충분히 달릴 수 있는 긴 안전 구간 ─── */
    _buildStart(){
        const safeW=this.W*1.4;
        const startPl={x:0,y:this.baseY,w:safeW};
        this.platforms.push(startPl);
        this.player.y=this.baseY-this.pH-this.pHt;

        // 시작 즉시 한라봉 — 플레이어(26%) 바로 앞 구간에 배치
        [0.32, 0.46, 0.62, 0.78].forEach(frac=>{
            const fx = safeW * frac;
            this.items.push({
                type:'hallabong',
                x:fx, baseY:startPl.y-36, bobY:startPl.y-36,
                bobT:Math.random()*Math.PI*2, r:16
            });
        });
        // 공중 한라봉 추가 (시작 직후 화면)
        [0.40, 0.60].forEach(frac=>{
            const fx = safeW * frac;
            this.items.push({
                type:'hallabong',
                x:fx, baseY:startPl.y-90, bobY:startPl.y-90,
                bobT:Math.random()*Math.PI*2, r:16
            });
        });

        let lx=safeW, ly=this.baseY;
        for(let i=0;i<12;i++){
            const p=this._nextPlat(lx,ly,0);
            this.platforms.push(p);
            lx=p.x+p.w; ly=p.y;
        }
    }

    /* ─── 2. 플랫폼 생성: 점프 물리 기반으로 안전 범위 보장 ─── */
    _nextPlat(px,py,diff){
        // ✅ gap: 현재 스크롤 속도 기준 한 번 점프로 반드시 건널 수 있는 범위
        //    safeGapMax = 체공프레임 × 현재속도 × 0.50 (50% 여유)
        const curSpeed = Math.min(this.scrollMax, 5.3 + this.score * 0.018);
        const safeMax = this._airFrames * curSpeed * 0.48;
        const gMin = Math.max(33, this.W * 0.055);        // ×1.1배
        const gMax = Math.min(safeMax, this.W * 0.143 + diff * this.W * 0.0066); // ×1.1배
        const gap = gMin + Math.random() * (gMax - gMin);

        // ✅ 높이 변동: 점프력으로 확실히 올라갈 수 있는 범위로 제한
        //    최대 상승 = jpow²/(2*grav) ≈ 256px — 하지만 너무 위면 도달 불가
        //    안전 상승 한계: 최대 높이의 45%
        const maxUp   = (16*16)/(2*0.50) * 0.42;  // ≈ 107px 위로
        const maxDown = this.H * 0.12;              // ≈ 아래로 12%

        // 위아래 변동을 분리해서 클램프
        let dy = (Math.random() - 0.5) * (maxUp + maxDown);
        dy = Math.max(-maxUp, Math.min(maxDown, dy));  // 위로 maxUp, 아래로 maxDown 제한
        const ny = Math.max(this.H * 0.38, Math.min(this.baseY + this.H * 0.03, py + dy));

        // ✅ 너비: 충분히 길게 — 최소 20%, 최대 42%
        const wMin = this.W * 0.20;
        const wMax = this.W * 0.42;
        const w = wMin + Math.random() * (wMax - wMin);

        return{x:px+gap, y:ny, w};
    }

    _diff(){return Math.min(10,this.score*.22);}  // 이전 .35 → .22로 완만하게

    start(){
        this.reset();
        this.cv.addEventListener('click',this._tapH);
        this.cv.addEventListener('touchstart',this._tapH,{passive:false});
        document.addEventListener('keydown',this._keyH);

        // ── Fixed Timestep 게임 루프 ──
        // FIXED_DT: 물리 1스텝 = 16ms (62.5스텝/초, 60fps 기준과 동일)
        // rAF 'now' 파라미터 미사용 → performance.now() 직접 호출
        // (브라우저별 rAF timestamp 구현 차이 완전 제거)
        const FIXED_DT = 16;          // 정수 ms — 부동소수점 누적 오차 최소화
        const MAX_STEPS = 5;          // 프레임당 최대 물리 스텝 (저사양 PC 폭주 방지)
        let accumulator = 0;
        let lastTime = performance.now();

        const tick = () => {
            const now = performance.now();           // rAF 파라미터 무시, 직접 측정
            const elapsed = Math.min(now - lastTime, 200); // 최대 200ms 캡
            lastTime = now;
            accumulator += elapsed;

            // 최대 MAX_STEPS 스텝만 실행 — 저사양 PC에서도 렌더 끊기지 않게
            let steps = 0;
            while(accumulator >= FIXED_DT && steps < MAX_STEPS){
                this._update(FIXED_DT);
                accumulator -= FIXED_DT;
                steps++;
                if(this.dead) break;
            }
            // 저사양 PC에서 스텝 한도 초과시 누적 버림 (게임 느려지는 것 방지)
            if(accumulator > FIXED_DT * MAX_STEPS) accumulator = 0;

            this._draw();
            this._raf = requestAnimationFrame(tick);
        };
        this._raf = requestAnimationFrame(tick);
    }

    stop(){
        cancelAnimationFrame(this._raf);
        this.cv.removeEventListener('click',this._tapH);
        this.cv.removeEventListener('touchstart',this._tapH);
        document.removeEventListener('keydown',this._keyH);
    }

    _tap(e){
        if(e)e.preventDefault();
        if(this.dead)return;
        const p=this.player;
        if(p.jc<p.maxJ){p.vy=p.jpow;p.onGround=false;p.jc++;sfx.resume();sfx.jump();}
    }

    _initDolphins(){
        return[...Array(4)].map((_,i)=>({
            x:Math.random()*this.W,
            phase:0,
            speed:.0028+Math.random()*.0018,   // ← 훨씬 느리게 (이전 .008+)
            size:.75+Math.random()*.45,
            active:false,
            timer:Math.random()*4000           // 초기 타이머 분산
        }));
    }

    // ─── 가오리 초기화 ───
    _initRays(){
        return [...Array(3)].map((_,i)=>({
            x: this.W*(0.15+i*0.35),
            y: this.baseY+18,
            dir: i%2===0?1:-1,
            speed: 0.55+Math.random()*0.4,
            size: 0.9+Math.random()*0.5,
            wingT: Math.random()*Math.PI*2,
            floatT: Math.random()*Math.PI*2,
            alpha: 0.0,
            rising: false,
            timer: i*2500+Math.random()*3000
        }));
    }

    // ─── 몰라몰라(개복치) 초기화 — 2분(120초) 간격 ───
    _initMolas(){
        return [...Array(2)].map((_,i)=>({
            x: this.W*(0.25 + i*0.5),
            y: this.H + 120,          // 화면 아래 대기
            vy: 0,
            dir: i%2===0 ? 1 : -1,
            size: 1.1 + Math.random()*0.3,
            alpha: 0,
            state: 'wait',            // wait → rising → surface → sinking
            timer: i*60000,           // 첫 등장 타이밍 엇갈리게 (0s, 60s)
            interval: 120000,         // 2분 간격
            finT: 0,                  // 지느러미 애니메이션 타이머
            wobble: Math.random()*Math.PI*2
        }));
    }

    _updateMolas(dt){
        this.molas.forEach(m=>{
            m.timer += dt;
            m.finT  += 0.025;
            m.wobble += 0.008;

            if(m.state === 'wait'){
                if(m.timer >= m.interval){
                    m.timer = 0;
                    m.state = 'rising';
                    m.x = this.W*(0.1 + Math.random()*0.8);
                    m.y = this.H + 100;
                    m.alpha = 0;
                    m.vy = -0.7; // 천천히 올라옴
                }
            } else if(m.state === 'rising'){
                m.y  += m.vy;
                m.alpha = Math.min(m.alpha + 0.012, 0.9);
                // 수면 근처 도달
                if(m.y < this.baseY + 30){
                    m.y = this.baseY + 30;
                    m.vy = 0;
                    m.state = 'surface';
                    m.timer = 0;
                }
            } else if(m.state === 'surface'){
                // 수면 근처에서 8초 머물며 좌우로 천천히 이동
                m.x += m.dir * 0.4;
                if(m.x < 40 || m.x > this.W - 40) m.dir *= -1;
                if(m.timer > 8000){
                    m.state = 'sinking';
                    m.vy = 0.5;
                }
            } else if(m.state === 'sinking'){
                m.y    += m.vy;
                m.vy   += 0.04;
                m.alpha = Math.max(m.alpha - 0.015, 0);
                if(m.y > this.H + 100){
                    m.state = 'wait';
                    m.timer = 0;
                    m.alpha = 0;
                }
            }
        });
    }

    _drawMolas(cx){
        this.molas.forEach(m=>{
            if(m.alpha < 0.02) return;
            const sc = m.size;
            const wob = Math.sin(m.wobble) * 2; // 살짝 흔들림

            cx.save();
            cx.globalAlpha = m.alpha;
            cx.translate(m.x, m.y + wob);

            // ── 몸통 (거의 원형, 납작하게 눌린 타원) ──
            const bodyG = cx.createRadialGradient(-12*sc,-14*sc,4,0,0,52*sc);
            bodyG.addColorStop(0, '#e8e8e8');
            bodyG.addColorStop(0.4,'#c8c8c8');
            bodyG.addColorStop(0.75,'#a0a0a0');
            bodyG.addColorStop(1,   '#787878');
            cx.fillStyle = bodyG;
            cx.beginPath();
            cx.ellipse(0, 0, 48*sc, 56*sc, 0, 0, Math.PI*2);
            cx.fill();

            // ── 몸통 무늬 (흰 배) ──
            cx.fillStyle = 'rgba(255,255,255,0.35)';
            cx.beginPath();
            cx.ellipse(0, 10*sc, 28*sc, 34*sc, 0, 0, Math.PI*2);
            cx.fill();

            // ── 등지느러미 (위) ──
            cx.fillStyle = '#8a8a8a';
            cx.beginPath();
            cx.moveTo(-8*sc, -50*sc);
            cx.bezierCurveTo(-14*sc,-80*sc, 10*sc,-90*sc, 14*sc,-72*sc);
            cx.bezierCurveTo(12*sc,-60*sc,  2*sc,-52*sc,  8*sc,-50*sc);
            cx.closePath(); cx.fill();
            // 지느러미 하이라이트
            cx.fillStyle='rgba(200,200,200,0.4)';
            cx.beginPath();
            cx.moveTo(-6*sc,-52*sc);
            cx.bezierCurveTo(-10*sc,-72*sc,4*sc,-82*sc,10*sc,-68*sc);
            cx.bezierCurveTo(6*sc,-58*sc,0*sc,-54*sc,-6*sc,-52*sc);
            cx.fill();

            // ── 배지느러미 (아래) ──
            cx.fillStyle = '#8a8a8a';
            cx.beginPath();
            cx.moveTo(-8*sc, 50*sc);
            cx.bezierCurveTo(-12*sc,76*sc, 8*sc,86*sc, 14*sc,68*sc);
            cx.bezierCurveTo(10*sc,58*sc,  2*sc,52*sc, 8*sc,50*sc);
            cx.closePath(); cx.fill();

            // ── 꼬리 (클라비폼 — 개복치 특유의 둥근 꼬리) ──
            cx.fillStyle = '#909090';
            cx.beginPath();
            cx.moveTo(46*sc, -18*sc);
            cx.bezierCurveTo(62*sc,-28*sc, 72*sc,-22*sc, 68*sc,-8*sc);
            cx.bezierCurveTo(74*sc,-2*sc,  74*sc, 2*sc,  68*sc, 8*sc);
            cx.bezierCurveTo(72*sc,22*sc,  62*sc,28*sc,  46*sc,18*sc);
            cx.bezierCurveTo(50*sc,8*sc,   50*sc,-8*sc,  46*sc,-18*sc);
            cx.closePath(); cx.fill();
            cx.fillStyle='rgba(210,210,210,0.35)';
            cx.beginPath();
            cx.ellipse(58*sc,0,8*sc,14*sc,0,0,Math.PI*2);
            cx.fill();

            // ── 눈 ──
            cx.fillStyle = '#222';
            cx.beginPath(); cx.arc(-20*sc,-10*sc, 7*sc, 0, Math.PI*2); cx.fill();
            cx.fillStyle = '#444';
            cx.beginPath(); cx.arc(-20*sc,-10*sc, 5*sc, 0, Math.PI*2); cx.fill();
            cx.fillStyle = 'rgba(255,255,255,0.85)';
            cx.beginPath(); cx.arc(-18*sc,-13*sc, 2.5*sc, 0, Math.PI*2); cx.fill();
            // 눈 테두리
            cx.strokeStyle = 'rgba(80,80,80,0.6)'; cx.lineWidth = 1.5*sc;
            cx.beginPath(); cx.arc(-20*sc,-10*sc, 7*sc, 0, Math.PI*2); cx.stroke();

            // ── 입 (작고 동그란 — 개복치 특징) ──
            cx.fillStyle = '#555';
            cx.beginPath(); cx.arc(-46*sc, 2*sc, 5*sc, 0, Math.PI*2); cx.fill();
            cx.fillStyle = '#333';
            cx.beginPath(); cx.arc(-46*sc, 2*sc, 3*sc, 0, Math.PI*2); cx.fill();

            // ── 아가미 선 ──
            cx.strokeStyle = 'rgba(100,100,100,0.4)'; cx.lineWidth = 1.5*sc;
            cx.beginPath();
            cx.moveTo(-32*sc,-22*sc);
            cx.bezierCurveTo(-38*sc,-10*sc,-38*sc,10*sc,-32*sc,22*sc);
            cx.stroke();

            // ── 피부 질감 (작은 무늬들) ──
            cx.fillStyle = 'rgba(100,100,100,0.12)';
            [[-10,-20],[15,-30],[20,5],[-5,25],[-25,10],[10,30]].forEach(([px,py])=>{
                cx.beginPath(); cx.arc(px*sc,py*sc,4*sc,0,Math.PI*2); cx.fill();
            });

            // ── 수면 굴절 (수면 바로 아래) ──
            if(m.y > this.baseY - 20){
                cx.globalAlpha = m.alpha * 0.3;
                cx.fillStyle = 'rgba(135,200,235,0.4)';
                cx.beginPath();
                cx.ellipse(0, -52*sc, 35*sc, 8*sc, 0, 0, Math.PI*2);
                cx.fill();
            }

            cx.restore();
        });
        cx.globalAlpha = 1;
    }

    _updateRays(dt){
        this.rays.forEach(r=>{
            r.timer+=dt;
            if(!r.rising && r.timer>5000+Math.random()*6000){
                r.rising=true; r.timer=0;
                r.x=this.W*(0.05+Math.random()*0.9);
            }
            if(r.rising){
                r.alpha=Math.min(r.alpha+0.015,0.82);
                r.y=this.baseY+10+Math.sin(r.floatT)*8;
            } else {
                r.alpha=Math.max(r.alpha-0.008,0);
                r.y=this.baseY+22;
            }
            if(r.rising && r.timer>4000) r.rising=false;
            r.x+=r.dir*r.speed;
            if(r.x<-80) r.x=this.W+60;
            if(r.x>this.W+80) r.x=-60;
            r.wingT+=0.04;
            r.floatT+=0.018;
        });
    }

    _drawRays(cx){
        this.rays.forEach(r=>{
            if(r.alpha<0.02) return;
            const sc=r.size;
            const wing=Math.sin(r.wingT)*12;
            cx.save();
            cx.globalAlpha=r.alpha;
            cx.translate(r.x,r.y);
            cx.scale(r.dir,1);
            // 몸통
            const bG=cx.createRadialGradient(0,0,2,0,0,38*sc);
            bG.addColorStop(0,'#4a7aaa');bG.addColorStop(0.5,'#2a5580');bG.addColorStop(1,'#1a3860');
            cx.fillStyle=bG;
            cx.beginPath();
            cx.moveTo(0,-12*sc);
            cx.bezierCurveTo(8*sc,-8*sc,18*sc,-2*sc,20*sc,0);
            cx.bezierCurveTo(18*sc,2*sc,8*sc,8*sc,0,10*sc);
            cx.bezierCurveTo(-8*sc,8*sc,-18*sc,2*sc,-20*sc,0);
            cx.bezierCurveTo(-18*sc,-2*sc,-8*sc,-8*sc,0,-12*sc);
            cx.closePath();cx.fill();
            // 왼쪽 날개
            cx.fillStyle='#1e4a70';
            cx.beginPath();
            cx.moveTo(-18*sc,0);
            cx.bezierCurveTo(-32*sc,-4*sc,-50*sc,wing*sc*0.6,-55*sc,wing*sc);
            cx.bezierCurveTo(-48*sc,wing*sc+6*sc,-30*sc,6*sc,-18*sc,4*sc);
            cx.closePath();cx.fill();
            // 오른쪽 날개
            cx.fillStyle='#1e4a70';
            cx.beginPath();
            cx.moveTo(18*sc,0);
            cx.bezierCurveTo(32*sc,-4*sc,50*sc,-wing*sc*0.6,55*sc,-wing*sc);
            cx.bezierCurveTo(48*sc,-wing*sc-6*sc,30*sc,6*sc,18*sc,4*sc);
            cx.closePath();cx.fill();
            // 꼬리
            cx.strokeStyle='#1a3060';cx.lineWidth=2.5*sc;
            cx.beginPath();cx.moveTo(0,10*sc);
            cx.bezierCurveTo(2*sc,22*sc,-3*sc,36*sc,1*sc,52*sc);cx.stroke();
            // 배
            cx.fillStyle='rgba(100,160,220,0.3)';
            cx.beginPath();cx.ellipse(0,2*sc,12*sc,7*sc,0,0,Math.PI*2);cx.fill();
            // 눈
            cx.fillStyle='#0a1a2a';
            cx.beginPath();cx.arc(-5*sc,-4*sc,2.5*sc,0,Math.PI*2);cx.fill();
            cx.fillStyle='rgba(255,255,255,0.6)';
            cx.beginPath();cx.arc(-4*sc,-5*sc,1*sc,0,Math.PI*2);cx.fill();
            // 등 무늬
            cx.fillStyle='rgba(180,220,255,0.28)';
            [[-4,-6],[4,-4],[-8,0],[6,2]].forEach(([px,py])=>{
                cx.beginPath();cx.arc(px*sc,py*sc,2*sc,0,Math.PI*2);cx.fill();
            });
            cx.restore();
        });
        cx.globalAlpha=1;
    }

    _update(dt){
        // dt는 항상 FIXED_DT(16ms)로 고정됨
        // 시간 누적 카운터(애니메이션)에만 dt 사용
        // 위치/속도 계산은 상수 기반 → 프레임레이트와 완전 무관

        if(this.dead){
            this.particles=this.particles.filter(p=>{
                p.life-=dt; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
                return p.life>0;
            });
            this._updateDolphins(dt);
            this._updateRays(dt);
            this._updateMolas(dt);
            this._updateFireworks(dt);
            this._updateLava(dt);
            return;
        }

        this.bgT += 0.016;
        this.gameTimeSec += 0.016;
        // 주기적 한라봉 보장 (2~3초마다 1~2개 공중 스폰)
        this._hallTimer += 16;
        if(this._hallTimer > 2200 + Math.random()*1000){
            this._hallTimer = 0;
            const count = 1 + Math.floor(Math.random()*2);
            for(let i=0;i<count;i++){
                const fx = this.W*0.6 + Math.random()*this.W*0.35;
                const fy = this.baseY - 60 - Math.random()*this.H*0.25;
                this.items.push({type:'hallabong',x:fx,baseY:fy,bobY:fy,bobT:Math.random()*Math.PI*2,r:16});
            }
        } // 16ms 고정 스텝 → 초 누적
        const diff = this._diff();

        // ── 스크롤 ──
        const tX = this.W * 0.26;
        this.player.x -= this.scroll;
        this.dist += this.scroll;
        if(this.player.x < tX){
            const sh = tX - this.player.x;
            this.player.x = tX;
            this.platforms.forEach(p => p.x -= sh);
            this.items.forEach(i => i.x -= sh);
            this.enemies.forEach(e => e.x -= sh);
        }

        // ── 플레이어 물리 ──
        const p = this.player;
        p.vy = Math.min(p.vy + p.grav, p.maxFall);
        p.y  += p.vy;

        // ── 플랫폼 충돌 ──
        p.onGround = false;
        for(const pl of this.platforms){
            if(p.x + this.pW*0.8 > pl.x && p.x + this.pW*0.2 < pl.x + pl.w){
                if(p.y + this.pHt > pl.y && p.y + this.pHt < pl.y + this.pH + Math.abs(p.vy) + 6 && p.vy >= 0){
                    p.y = pl.y - this.pHt;
                    p.vy = 0; p.onGround = true; p.jc = 0;
                    sfx.land(); break;
                }
            }
        }
        if(p.y > this.H + 60){ this._die(); return; }
        if(p.y < -250){ p.y = -250; p.vy = Math.abs(p.vy) * 0.3; }

        // ── 플랫폼 생성/제거 ──
        this.platforms = this.platforms.filter(pl => pl.x + pl.w > -80);
        let rm = this.platforms.length
            ? Math.max(...this.platforms.map(pl => pl.x + pl.w))
            : -9999;
        while(rm < this.W + 400){
            const last = this.platforms[this.platforms.length - 1];
            const np = this._nextPlat(last.x + last.w, last.y, diff);
            this.platforms.push(np);
            this._spawnOnPlatform(np);
            rm = np.x + np.w;
        }

        // ── 아이템 (한라봉) ──
        this.items = this.items.filter(it => {
            it.bobT += 0.05;
            it.bobY = it.baseY + Math.sin(it.bobT) * 5;

            // ── 거대 한라봉 (+10) ──
            if(it.type === 'giant_hallabong'){
                it.x += it.speedX;
                it.bobY = it.baseY + Math.sin(it.bobT) * 8;
                const dx = it.x-(p.x+this.pW/2), dy = it.bobY-(p.y+this.pHt/2);
                if(Math.sqrt(dx*dx+dy*dy) < it.r+this.pW*0.5){
                    this.score+=10;
                    document.getElementById('score').textContent=this.score;
                    const best=+localStorage.getItem('np10_best')||0;
                    if(this.score>best){localStorage.setItem('np10_best',this.score);document.getElementById('best').textContent=this.score;}
                    sfx.collect();
                    this._popup(it.x,it.bobY-56,'+10 🍊','score-pop');
                    this._burst(it.x,it.bobY,'#FF8C00',22);
                    return false;
                }
                return it.x > -120;
            }

            // ── 대왕 한라봉 (+50) ──
            if(it.type === 'king_hallabong'){
                it.x += it.speedX;
                it.bobY = it.baseY + Math.sin(it.bobT) * 10;
                const dx = it.x-(p.x+this.pW/2), dy = it.bobY-(p.y+this.pHt/2);
                if(Math.sqrt(dx*dx+dy*dy) < it.r+this.pW*0.5){
                    this.score+=50;
                    document.getElementById('score').textContent=this.score;
                    const best=+localStorage.getItem('np10_best')||0;
                    if(this.score>best){localStorage.setItem('np10_best',this.score);document.getElementById('best').textContent=this.score;}
                    sfx.collect();
                    this._popup(it.x,it.bobY-80,'+50 👑','score-pop');
                    this._burst(it.x,it.bobY,'#FFD700',32);
                    return false;
                }
                return it.x > -160;
            }

            // ── 일반 한라봉 (+10) ──
            const dx = it.x-(p.x+this.pW/2), dy = it.bobY-(p.y+this.pHt/2);
            if(Math.sqrt(dx*dx+dy*dy) < it.r+this.pW*0.38){
                this.score+=10;
                document.getElementById('score').textContent=this.score;
                const best=+localStorage.getItem('np10_best')||0;
                if(this.score>best){localStorage.setItem('np10_best',this.score);document.getElementById('best').textContent=this.score;}
                sfx.collect();
                this._popup(it.x,it.bobY-24,'+10','score-pop');
                this._burst(it.x,it.bobY,'#FF8C00');
                return false;
            }
            return it.x > -100;
        });

        // ── 적 (거북이/문어) ──
        this.enemies = this.enemies.filter(en => {
            en.fT += dt;
            if(en.fT > 220){ en.fT = 0; en.frame = (en.frame + 1) % 2; }
            if(en.patrol){
                en.x += en.dir * en.speed;
                if(en.x < en.bL || en.x > en.bR) en.dir *= -1;
            } else {
                en.floatT += 0.032; // 고정 증가량 (dt*.002 * 16 = 0.032)
                en.y = en.baseY + Math.sin(en.floatT) * en.floatAmp;
            }
            const ex = en.x - en.w/2, ey = en.y, pad = 9;
            if(p.x + this.pW - pad > ex + pad && p.x + pad < ex + en.w - pad &&
               p.y + this.pHt - pad > ey + pad && p.y + pad < ey + en.h - pad){
                this._die(); return false;
            }
            return en.x > -120;
        });

        // ── 파티클 ──
        this.particles = this.particles.filter(pt => {
            pt.life -= dt; pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15;
            return pt.life > 0;
        });

        // ── 속도 증가 ──
        this.scroll = Math.min(this.scrollMax, 5.3 + this.score * 0.018);

        // ── 거대 한라봉 등장 체크 (2분/5분/10분) ──
        this._checkGiantHallabong();

        // ── 구름 ──
        this.clouds.forEach(c => {
            c.x -= c.s * (1 - c.layer * 0.1);
            if(c.x + c.w < -20) c.x = this.W + c.w * 0.5 + Math.random() * 80;
        });

        this._updateDolphins(dt);
        this._updateRays(dt);
        this._updateMolas(dt);
        this._checkScoreEvents();
        this._updateFireworks(dt);
        this._updateLava(dt);
    }

    /* ─── 3. 플랫폼 위/공중에 아이템·적 스폰 ─── */
    _spawnOnPlatform(pl){
        const diff=this._diff();
        const isEarly=(this.dist<800); // 초반 구간

        // 한라봉 OR 적 결정
        // 초반/이후 모두 높은 확률로 한라봉 보장
        const hallabongChance = isEarly ? 0.92 : 0.85;
        const roll=Math.random();

        if(roll < hallabongChance){
            // ── 한라봉 ──
            const airborne=Math.random()<0.45;
            const count=1+Math.floor(Math.random()*3); // 1~3개
            for(let i=0;i<count;i++){
                const fx=pl.x+pl.w*.2+Math.random()*pl.w*.6;
                const fy=airborne ? pl.y-50-Math.random()*this.H*.18 : pl.y-32;
                this.items.push({
                    type:'hallabong',
                    x:fx,baseY:fy,bobY:fy,bobT:Math.random()*Math.PI*2,r:16
                });
            }
        } else if(roll < hallabongChance+0.27 && !isEarly && diff>0.5){
            // ── 적 (한라봉 없는 플랫폼만) ──
            const etype=Math.random()<0.5?'turtle':'octopus';
            const airborne=Math.random()<0.35; // 35% 공중 부유
            const ex=pl.x+pl.w*.25+Math.random()*pl.w*.5;
            const eh=etype==='turtle'?36:44;
            const ew=etype==='turtle'?52:46;

            if(airborne){
                // 공중 부유 적
                const baseY=pl.y-70-Math.random()*this.H*.15;
                this.enemies.push({
                    type:etype,x:ex,y:baseY,baseY,w:ew,h:eh,
                    frame:0,fT:0,patrol:false,
                    floatT:Math.random()*Math.PI*2,floatAmp:18+Math.random()*20,
                    dir:1,speed:0,bL:0,bR:0
                });
            } else {
                // 플랫폼 위 패트롤 적
                this.enemies.push({
                    type:etype,x:ex,y:pl.y-eh,baseY:pl.y-eh,w:ew,h:eh,
                    frame:0,fT:0,patrol:true,
                    floatT:0,floatAmp:0,
                    dir:Math.random()<.5?1:-1,speed:.7+Math.random()*.6,
                    bL:pl.x+12,bR:pl.x+pl.w-12
                });
            }
        }
        // 나머지 ~18%는 빈 플랫폼
    }

    // ── 별 초기화 ──
    _initStars(){
        return [...Array(120)].map(()=>({
            x: Math.random()*2000,
            y: Math.random()*0.65, // 화면 높이 비율
            r: 0.8+Math.random()*2.2,
            alpha: 0.4+Math.random()*0.6,
            twinkle: Math.random()*Math.PI*2,
            speed: 0.02+Math.random()*0.04
        }));
    }

    _drawStars(cx,W,H){
        if(!this.stars) return;
        this.stars.forEach(s=>{
            s.twinkle += s.speed;
            s.x -= 0.3; // 천천히 흐름
            if(s.x < -5) s.x = W+5;
            const alpha = s.alpha*(0.6+0.4*Math.sin(s.twinkle));
            cx.fillStyle=`rgba(255,255,220,${alpha})`;
            cx.beginPath();cx.arc(s.x, H*s.y, s.r, 0, Math.PI*2);cx.fill();
            // 밝은 별은 십자 광채
            if(s.r > 2){
                cx.strokeStyle=`rgba(255,255,200,${alpha*0.5})`;cx.lineWidth=0.8;
                cx.beginPath();cx.moveTo(s.x-s.r*2.5,s.y*H);cx.lineTo(s.x+s.r*2.5,s.y*H);cx.stroke();
                cx.beginPath();cx.moveTo(s.x,s.y*H-s.r*2.5);cx.lineTo(s.x,s.y*H+s.r*2.5);cx.stroke();
            }
        });
    }

    _updateLava(dt){
        if(!this.volcanoActive) return;
        this._lavaTimer = (this._lavaTimer||0) + dt;
        // 0.3초마다 용암 파티클 발사
        if(this._lavaTimer > 300){
            this._lavaTimer = 0;
            const peak = this.baseY - 230; // 한라산 정상
            const cx2  = this.W * 0.5;
            for(let i=0;i<6;i++){
                const a = -Math.PI*0.5 + (Math.random()-0.5)*Math.PI*0.8;
                const spd = 3+Math.random()*5;
                this.lavaBlobs.push({
                    x: cx2+(Math.random()-0.5)*20,
                    y: peak,
                    vx: Math.cos(a)*spd,
                    vy: Math.sin(a)*spd - 2,
                    life: 1200+Math.random()*800,
                    maxLife: 2000,
                    r: 4+Math.random()*6,
                    hue: Math.random()<0.5?15:30 // 붉은/주황
                });
            }
        }
        this.lavaBlobs = this.lavaBlobs.filter(b=>{
            b.x+=b.vx; b.y+=b.vy;
            b.vy+=0.12; b.vx*=0.98;
            b.life-=dt;
            return b.life>0 && b.y<this.H+20;
        });
    }

    _drawVolcano(cx,W,baseY){
        // 분화구 위 폭발 이펙트 (화산 재/연기 기둥)
        const peak = baseY-230, cx2 = W*0.5;
        // 연기 기둥
        const smokeAlpha = 0.25+0.1*Math.sin(this.bgT*2);
        for(let i=0;i<5;i++){
            const sy = peak - i*22;
            const sr = 14+i*9;
            const sa = smokeAlpha*(1-i*0.15);
            cx.fillStyle=`rgba(60,30,10,${sa})`;
            cx.beginPath();cx.arc(cx2+(Math.sin(this.bgT*1.5+i)*8),sy,sr,0,Math.PI*2);cx.fill();
        }
        // 분화구 붉은 빛
        const glowG = cx.createRadialGradient(cx2,peak+20,4,cx2,peak+20,60);
        glowG.addColorStop(0,'rgba(255,100,0,0.7)');
        glowG.addColorStop(0.4,'rgba(255,50,0,0.3)');
        glowG.addColorStop(1,'rgba(255,0,0,0)');
        cx.fillStyle=glowG;cx.beginPath();cx.arc(cx2,peak+20,60,0,Math.PI*2);cx.fill();
    }

    _drawLavaBlobs(cx){
        if(!this.lavaBlobs||!this.lavaBlobs.length) return;
        this.lavaBlobs.forEach(b=>{
            const t = b.life/b.maxLife;
            const alpha = Math.min(1, t*2);
            // 식어가면서 색 변화 (밝은 주황→붉은→어두운 적갈)
            const r = Math.round(255);
            const g = Math.round(t>0.5 ? 160*(t-0.5)*2 : 0);
            cx.fillStyle=`rgba(${r},${g},0,${alpha})`;
            cx.beginPath();cx.arc(b.x,b.y,b.r*t+1,0,Math.PI*2);cx.fill();
            // 밝은 코어
            if(t>0.4){
                cx.fillStyle=`rgba(255,220,100,${alpha*0.6})`;
                cx.beginPath();cx.arc(b.x,b.y,b.r*0.4,0,Math.PI*2);cx.fill();
            }
        });
    }

    // ── 점수 기반 이벤트 ──
    _checkScoreEvents(){
        const s = this.score;
        const ev = this.scoreEvents;

        // 150점: 몰라몰라 등장 (바다에서 즉시 올라오게)
        if(!ev.mola150 && s >= 150){
            ev.mola150 = true;
            // 대기 중인 첫 번째 mola를 즉시 rising 상태로
            const m = this.molas.find(m => m.state === 'wait');
            if(m){ m.state='rising'; m.timer=0; m.x=this.W*(0.2+Math.random()*0.6); m.y=this.H+100; m.alpha=0; m.vy=-0.7; }
        }

        // 200점: 대왕 한라봉 등장 (50점)
        if(!ev.king200 && s >= 200){
            ev.king200 = true;
            const gY = this.H * 0.25 + Math.random() * this.H * 0.2;
            this.items.push({
                type:'king_hallabong',
                x: this.W + 100, baseY: gY, bobY: gY,
                bobT: Math.random()*Math.PI*2,
                r: 72,        // 매우 큼
                speedX: -1.8,
                points: 50
            });
        }

        // 300점: 불꽃놀이 시작
        if(!ev.firework300 && s >= 300){
            ev.firework300 = true;
            this.fireworkActive = true;
        }

        // 500점: 돌고래 핑크 변환
        if(!ev.pinkDol500 && s >= 500){
            ev.pinkDol500 = true;
            this.pinkDolphins = true;
        }
        // 800점: 노을
        if(!ev.sunset800 && s >= 800) ev.sunset800 = true;
        // 1000점: 밤하늘
        if(!ev.night1000 && s >= 1000) ev.night1000 = true;
        // 1200점: 화산 폭발
        if(!ev.volcano1200 && s >= 1200){
            ev.volcano1200 = true;
            this.volcanoActive = true;
        }
    }

    _updateFireworks(dt){
        if(!this.fireworkActive) return;
        // 불꽃 파티클 주기적 발사
        if(!this._fwTimer) this._fwTimer = 0;
        this._fwTimer += dt;
        if(this._fwTimer > 800){
            this._fwTimer = 0;
            // 화면 상단 랜덤 위치에서 폭발
            const ex = this.W * (0.15 + Math.random() * 0.7);
            const ey = this.H * (0.05 + Math.random() * 0.25);
            const hue = Math.floor(Math.random() * 360);
            for(let i=0;i<28;i++){
                const a = (i/28)*Math.PI*2;
                const spd = 2.5 + Math.random()*3.5;
                this.fireworks.push({
                    x:ex, y:ey,
                    vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1,
                    life: 900+Math.random()*600,
                    maxLife: 900+Math.random()*600,
                    color: `hsl(${hue+Math.random()*40},100%,${55+Math.random()*20}%)`,
                    size: 2.5+Math.random()*2.5
                });
            }
        }
        // 파티클 업데이트
        this.fireworks = this.fireworks.filter(p=>{
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.06; // 중력
            p.vx *= 0.97; p.vy *= 0.97;
            p.life -= dt;
            return p.life > 0;
        });
    }

    // ── 거대 한라봉 체크 및 스폰 ──
    _checkGiantHallabong(){
        const t = this.gameTimeSec;
        // 2분(120s), 5분(300s), 10분(600s) — 한 번씩만
        const milestones = [
            {key:'t2',  sec:120},
            {key:'t5',  sec:300},
            {key:'t10', sec:600},
        ];
        milestones.forEach(m=>{
            if(!this.giantSpawned[m.key] && t >= m.sec){
                this.giantSpawned[m.key] = true;
                // 화면 오른쪽 끝에서 날아오는 거대 한라봉 스폰
                const gY = this.H * 0.35 + Math.random() * this.H * 0.25;
                this.items.push({
                    type:'giant_hallabong',
                    x: this.W + 80,
                    baseY: gY, bobY: gY,
                    bobT: Math.random()*Math.PI*2,
                    r: 48,              // 일반(16)의 3배
                    speedX: -2.5        // 왼쪽으로 이동
                });
            }
        });
    }

    _die(){
        if(this.dead)return;
        this.dead=true;
        this.cv.removeEventListener('click',this._tapH);
        this.cv.removeEventListener('touchstart',this._tapH);
        document.removeEventListener('keydown',this._keyH);
        sfx.die();
        this._burst(this.player.x+this.pW/2,this.player.y+this.pHt/2,'#FFD700',24);
        setTimeout(()=>{if(this.onGameOver)this.onGameOver(this.score);},1500);
    }

    _burst(x,y,col,n=14){
        for(let i=0;i<n;i++)this.particles.push({x,y,vx:(Math.random()-.5)*9,vy:(Math.random()-1)*8,life:500+Math.random()*500,color:`hsl(${Math.random()*55+10},100%,55%)`});
    }

    _popup(x,y,txt,cls){
        const el=document.createElement('div');
        el.className=cls;el.textContent=txt;el.style.cssText=`left:${x}px;top:${y}px`;
        document.getElementById('game-screen').appendChild(el);
        setTimeout(()=>el.remove(),1000);
    }

    /* ─── 4. 돌고래 업데이트 ─── */
    _updateDolphins(dt){
        this.dolphins.forEach(d=>{
            d.timer+=dt;
            // 대기 시간 늘림: 4~9초 간격으로 점프
            if(d.timer>4000+Math.random()*5000){
                d.timer=0;
                d.x=this.W*.08+Math.random()*this.W*.84;
                d.phase=0;
                d.active=true;
            }
            if(d.active){
                d.phase+=d.speed*dt;
                if(d.phase>Math.PI){d.phase=0;d.active=false;d.timer=0;}
            }
        });
    }

    /* ══ DRAW ══ */
    _draw(){
        const cx=this.cx,W=this.W,H=this.H;

        // ── 하늘 (점수에 따라 변화) ──
        const ev=this.scoreEvents;
        const sg=cx.createLinearGradient(0,0,0,H);
        if(ev.night1000){
            // 1000점↑: 밤하늘
            sg.addColorStop(0,'#0a0a1a');sg.addColorStop(.5,'#0d1a2e');sg.addColorStop(1,'#0a1520');
        } else if(ev.sunset800){
            // 800점↑: 노을
            const t=Math.min(1,(this.score-800)/200); // 800→1000 구간에서 점진적
            const r1=Math.round(135+t*55),g1=Math.round(206-t*120),b1=Math.round(235-t*195);
            sg.addColorStop(0,`rgb(${Math.round(220+t*15)},${Math.round(80-t*60)},${Math.round(20+t*10)})`);
            sg.addColorStop(.3,`rgb(${Math.round(255)},${Math.round(140-t*80)},${Math.round(40)})`);
            sg.addColorStop(.65,`rgb(${Math.round(180+t*20)},${Math.round(100-t*60)},${Math.round(60+t*20)})`);
            sg.addColorStop(1,'#1e3050');
        } else {
            // 기본 낮 하늘
            sg.addColorStop(0,'#87CEEB');sg.addColorStop(.55,'#4a90c4');sg.addColorStop(1,'#1e5f74');
        }
        cx.fillStyle=sg;cx.fillRect(0,0,W,H);

        // ── 밤하늘 별 ──
        if(ev.night1000) this._drawStars(cx,W,H);

        // ── 태양 (노을/낮) 또는 달 (밤) ──
        if(ev.night1000){
            // 달
            cx.fillStyle='#fffce0';cx.beginPath();cx.arc(W*.88,H*.09,26,0,Math.PI*2);cx.fill();
            cx.fillStyle='#e8e0a0';cx.shadowBlur=0;
            // 달 크레이터
            [[0.82,-0.04,6],[0.92,0.04,4],[0.85,0.10,3]].forEach(([rx,ry,r])=>{
                cx.fillStyle='rgba(180,170,120,0.4)';
                cx.beginPath();cx.arc(W*rx,H*ry,r,0,Math.PI*2);cx.fill();
            });
        } else if(ev.sunset800){
            // 노을 태양 (크고 붉음)
            cx.fillStyle='#FF4500';cx.beginPath();cx.arc(W*.15,H*.12,42,0,Math.PI*2);cx.fill();
            cx.fillStyle='rgba(255,100,30,0.3)';cx.beginPath();cx.arc(W*.15,H*.12,62,0,Math.PI*2);cx.fill();
        } else {
            // 낮 태양
            cx.fillStyle='#FFD700';cx.beginPath();cx.arc(W*.88,H*.08,36,0,Math.PI*2);cx.fill();
        }

        // clouds — 3레이어 렌더링
        this.clouds.forEach(c=>{
            cx.globalAlpha=c.alpha;
            cx.fillStyle='#fff';
            // 구름 모양: layer에 따라 형태 다르게
            if(c.layer===0){
                cx.beginPath();cx.arc(c.x,c.y,c.w*.28,0,Math.PI*2);cx.arc(c.x+c.w*.3,c.y-8,c.w*.22,0,Math.PI*2);cx.arc(c.x+c.w*.52,c.y,c.w*.3,0,Math.PI*2);cx.fill();
            } else if(c.layer===1){
                cx.beginPath();cx.arc(c.x,c.y,c.w*.3,0,Math.PI*2);cx.arc(c.x+c.w*.28,c.y-12,c.w*.26,0,Math.PI*2);cx.arc(c.x+c.w*.55,c.y-6,c.w*.32,0,Math.PI*2);cx.arc(c.x+c.w*.8,c.y,c.w*.22,0,Math.PI*2);cx.fill();
                // 구름 하단 그림자
                cx.fillStyle='rgba(180,200,220,0.3)';
                cx.beginPath();cx.ellipse(c.x+c.w*.4,c.y+c.w*.18,c.w*.38,c.w*.1,0,0,Math.PI);cx.fill();
            } else {
                cx.beginPath();cx.arc(c.x,c.y,c.w*.28,0,Math.PI*2);cx.arc(c.x+c.w*.22,c.y-16,c.w*.3,0,Math.PI*2);cx.arc(c.x+c.w*.48,c.y-18,c.w*.28,0,Math.PI*2);cx.arc(c.x+c.w*.72,c.y-10,c.w*.24,0,Math.PI*2);cx.arc(c.x+c.w*.9,c.y,c.w*.2,0,Math.PI*2);cx.fill();
                cx.fillStyle='rgba(160,185,210,0.25)';
                cx.beginPath();cx.ellipse(c.x+c.w*.45,c.y+c.w*.14,c.w*.42,c.w*.09,0,0,Math.PI);cx.fill();
            }
            cx.globalAlpha=1;cx.fillStyle='rgba(255,255,255,.82)'; // reset
        });

        // ─── 한라산 + 백록담 ───
        this._drawHallashan(cx,W,this.baseY);
        if(this.scoreEvents.volcano1200) this._drawVolcano(cx,W,this.baseY);
        this._drawLavaBlobs(cx);

        // sea
        cx.fillStyle='#1e5f74';cx.fillRect(0,this.baseY+4,W,H-this.baseY);
        // wave layer 1
        cx.fillStyle='rgba(30,95,116,.9)';cx.beginPath();cx.moveTo(0,this.baseY+4);
        for(let x=0;x<=W;x+=12)cx.lineTo(x,this.baseY+4+Math.sin(x*.028+this.bgT)*6);
        cx.lineTo(W,this.baseY+22);cx.lineTo(0,this.baseY+22);cx.fill();
        // wave layer 2 (lighter)
        cx.fillStyle='rgba(41,128,185,.55)';cx.beginPath();cx.moveTo(0,this.baseY+2);
        for(let x=0;x<=W;x+=14)cx.lineTo(x,this.baseY+2+Math.sin(x*.022+this.bgT*1.3+1)*5);
        cx.lineTo(W,this.baseY+14);cx.lineTo(0,this.baseY+14);cx.fill();

        // ─── 돌고래 + 가오리 ───
        this._drawDolphins(cx);
        this._drawRays(cx);
        this._drawMolas(cx);

        // platforms
        this.platforms.forEach(pl=>this._drawPlatform(cx,pl));

        // items
        // 불꽃놀이 (배경 위, 플랫폼 아래)
        this._drawFireworks(cx);

        this.items.forEach(it=>{
            if(it.type==='hallabong') this._drawHallabong(cx,it.x,it.bobY,it.r);
            else if(it.type==='giant_hallabong') this._drawGiantHallabong(cx,it.x,it.bobY,it.r);
            else if(it.type==='king_hallabong') this._drawKingHallabong(cx,it.x,it.bobY,it.r);
        });

        // enemies
        this.enemies.forEach(en=>{
            if(en.type==='turtle')this._drawTurtle(cx,en);
            else this._drawOctopus(cx,en);
        });

        // player
        this._drawDol(cx,this.player.x,this.player.y,this.pW,this.pHt,this.player.vy);

        // particles
        this.particles.forEach(pt=>{cx.globalAlpha=Math.max(0,pt.life/900);cx.fillStyle=pt.color;cx.beginPath();cx.arc(pt.x,pt.y,5,0,Math.PI*2);cx.fill();});
        cx.globalAlpha=1;
    }

    /* ─── 백록담 있는 한라산 ─── */
    _drawHallashan(cx,W,baseY){
        const peak=baseY-230, cx2=W*.5;
        // 원경 안개
        const hazeG=cx.createLinearGradient(0,baseY-280,0,baseY);
        hazeG.addColorStop(0,'rgba(135,200,235,0)');hazeG.addColorStop(0.7,'rgba(135,200,235,0)');hazeG.addColorStop(1,'rgba(135,200,235,0.15)');
        cx.fillStyle=hazeG;cx.fillRect(0,baseY-280,W,280);
        // 원경 능선 (연보라)
        cx.fillStyle='#8aa8b8';
        cx.beginPath();cx.moveTo(-W*.1,baseY);cx.bezierCurveTo(W*.1,baseY-50,W*.3,baseY-70,cx2,baseY-230);
        cx.bezierCurveTo(W*.7,baseY-70,W*.9,baseY-50,W*1.1,baseY);cx.fill();
        // 산 메인 그라디언트
        const mG=cx.createLinearGradient(cx2,peak,cx2,baseY);
        mG.addColorStop(0,'#4a6840');mG.addColorStop(0.3,'#4e7548');mG.addColorStop(0.65,'#3d6040');mG.addColorStop(1,'#2e4e30');
        cx.fillStyle=mG;
        cx.beginPath();cx.moveTo(-W*.02,baseY);
        cx.bezierCurveTo(W*.15,baseY-35,W*.32,baseY-140,W*.44,baseY-215);
        cx.bezierCurveTo(W*.47,baseY-228,W*.48,baseY-230,cx2,peak);
        cx.bezierCurveTo(W*.52,baseY-230,W*.53,baseY-228,W*.56,baseY-215);
        cx.bezierCurveTo(W*.68,baseY-140,W*.85,baseY-35,W*1.02,baseY);cx.fill();
        // 햇빛 사면
        const sG=cx.createLinearGradient(cx2,peak,W*.85,baseY);
        sG.addColorStop(0,'rgba(120,175,100,0)');sG.addColorStop(0.4,'rgba(130,185,108,0.4)');sG.addColorStop(1,'rgba(100,155,80,0)');
        cx.fillStyle=sG;
        cx.beginPath();cx.moveTo(cx2,peak);cx.bezierCurveTo(W*.56,baseY-215,W*.7,baseY-95,W*1.02,baseY);cx.lineTo(cx2,baseY);cx.fill();
        // 수림 그림자
        const fG=cx.createLinearGradient(0,baseY-95,0,baseY);
        fG.addColorStop(0,'rgba(30,55,25,0)');fG.addColorStop(0.5,'rgba(30,55,25,0.3)');fG.addColorStop(1,'rgba(20,45,18,0.45)');
        cx.fillStyle=fG;
        cx.beginPath();cx.moveTo(-W*.02,baseY);cx.bezierCurveTo(W*.15,baseY-35,W*.35,baseY-95,W*.43,baseY-135);
        cx.lineTo(W*.57,baseY-135);cx.bezierCurveTo(W*.65,baseY-95,W*.85,baseY-35,W*1.02,baseY);cx.fill();
        // 암석

        cx.fillStyle=lG;cx.beginPath();cx.ellipse(crX,crY+5,28,9,0,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,255,255,0.48)';cx.beginPath();cx.ellipse(crX-9,crY+3,7,2.2,.15,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,255,255,0.28)';cx.beginPath();cx.ellipse(crX+7,crY+5,4,1.4,0,0,Math.PI*2);cx.fill();
        // 잔설
        cx.fillStyle='rgba(238,248,255,0.9)';
        cx.beginPath();cx.moveTo(cx2-12,crY-10);cx.bezierCurveTo(cx2-7,peak+4,cx2+7,peak+4,cx2+12,crY-10);
        cx.bezierCurveTo(cx2+5,crY-4,cx2-5,crY-4,cx2-12,crY-10);cx.fill();
        cx.fillStyle='rgba(228,242,252,0.72)';
        cx.beginPath();cx.ellipse(crX-19,crY-7,9,3,-.3,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(crX+17,crY-6,8,2.8,.25,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(218,238,250,0.5)';
        cx.beginPath();cx.ellipse(W*.42,crY+12,14,4.5,-.2,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(W*.58,crY+12,14,4.5,.2,0,Math.PI*2);cx.fill();
        // 하단 대기 안개
        const fgG=cx.createLinearGradient(0,baseY-55,0,baseY);
        fgG.addColorStop(0,'rgba(175,210,228,0)');fgG.addColorStop(1,'rgba(175,210,228,0.2)');
        cx.fillStyle=fgG;cx.fillRect(0,baseY-55,W,56);

        // ── NATPRO10 픽셀 스타일 타이틀 (한라산 위 하늘) ──
        const titleCX = cx2;
        const titleCY = peak - 160;  // 한라산 정상보다 160px 위

        cx.save();

        // ── 배경: 픽셀 패널 (8비트 게임 네임플레이트 느낌) ──
        const ptW = Math.min(W * 0.82, 480);

        const ptX = titleCX - ptW / 2;

        // 픽셀 테두리 (두꺼운 흰 외곽 → 검정 안쪽 → 반투명 내부)

        cx.fillRect(ptX - 2, ptY - 2, ptW + 4, ptH + 4);
        // 내부 배경 (아주 짙은 네이비 → 픽셀 게임 배경)
        const panG = cx.createLinearGradient(ptX, ptY, ptX, ptY + ptH);
        panG.addColorStop(0,   'rgba(5,10,40,0.92)');
        panG.addColorStop(0.5, 'rgba(8,16,58,0.92)');
        panG.addColorStop(1,   'rgba(5,10,40,0.92)');
        cx.fillStyle = panG;
        cx.fillRect(ptX, ptY, ptW, ptH);

        // 내부 스캔라인 (픽셀 모니터 느낌)
        cx.fillStyle = 'rgba(255,255,255,0.025)';
        for(let ly = ptY + 2; ly < ptY + ptH; ly += 4){
            cx.fillRect(ptX, ly, ptW, 1.5);
        }

        // ── 별 장식 (픽셀 반짝임) ──
        const starT = this.bgT * 2.2;
        [[ptX+18, ptY+10],[ptX+ptW-18, ptY+10],
         [ptX+10, ptY+ptH-10],[ptX+ptW-10, ptY+ptH-10]].forEach(([sx,sy],i)=>{
            const pulse = 0.4 + 0.6 * Math.abs(Math.sin(starT + i * 1.1));
            cx.fillStyle = `rgba(255,220,50,${pulse})`;
            // 픽셀 별 (십자형)
            const sr = 3;
            cx.fillRect(sx-sr, sy-1, sr*2, 2);
            cx.fillRect(sx-1, sy-sr, 2, sr*2);

        // ── 메인 타이틀: NATPRO10 ──

            cx.fillStyle = col;
            cx.fillText('NATPRO10', titleCX + (i+1)*2, titleCY - 10 + (i+1)*2);

        // 글로우 (황금색 빛 번짐)

        cx.shadowBlur = 0;

        // ── 패널 하단 깜박이는 장식선 (8비트 언더라인) ──
        const lineAlpha = 0.4 + 0.35 * Math.sin(this.bgT * 4);
        cx.fillStyle = `rgba(255,215,0,${lineAlpha})`;
        cx.fillRect(ptX + 8, ptY + ptH - 5, ptW - 16, 2);

        cx.restore();

        // ── 귤나무 (한라산 하단 좌우) ──
        [{x:W*0.14,s:0.82},{x:W*0.22,s:0.96},{x:W*0.36,s:0.72},
         {x:W*0.64,s:0.74},{x:W*0.78,s:0.98},{x:W*0.86,s:0.85}
        ].forEach(t=>this._drawCitrusTree(cx,t.x,baseY,t.s));

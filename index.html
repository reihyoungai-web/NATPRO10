<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ASNP NATPRO10 in JEJU island</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="hud top">
      <div class="title">ASNP NATPRO10 in JEJU island</div>
      <div class="scoreboard">
        <span>점수 <strong id="score">0</strong></span>
        <span>최고점수 <strong id="bestScore">0</strong></span>
      </div>
    </div>

    <canvas id="gameCanvas" width="960" height="540" aria-label="Jeju jump game"></canvas>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <h1>돌하르방 점프 게임</h1>
        <p>터치/클릭 = 돌하르방이 위로 점프</p>
        <p>한라봉 🍊 수집 = +10점</p>
        <p>문어 🐙 / 거북이 🐢 에 닿으면 = 게임 오버!</p>
        <button id="startBtn">게임 시작</button>
        <div class="hint">화면 터치 · 마우스 클릭 · 스페이스바 지원</div>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="panel">
        <h2>게임 오버</h2>
        <p>최종 점수: <strong id="finalScore">0</strong></p>
        <button id="restartBtn">다시 시작</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>

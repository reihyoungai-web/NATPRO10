    _drawCitrusTree(cx,x,baseY,scale){
        cx.save();cx.translate(x,baseY);cx.scale(scale,scale);
        // 줄기
        cx.fillStyle='#5C3317';cx.fillRect(-5,-38,10,38);
        // 잔가지
        cx.strokeStyle='#5C3317';cx.lineWidth=3;
        cx.beginPath();cx.moveTo(0,-28);cx.lineTo(-14,-40);cx.stroke();
        cx.beginPath();cx.moveTo(0,-22);cx.lineTo(12,-36);cx.stroke();
        // 잎 덩어리
        const lc=['#1a6b1a','#228B22','#2d9e2d','#1f7a1f'];
        [{dx:0,dy:-52,r:24},{dx:-18,dy:-42,r:18},{dx:18,dy:-42,r:18},
         {dx:-10,dy:-64,r:16},{dx:10,dy:-64,r:16},{dx:0,dy:-72,r:14}
        ].forEach((l,i)=>{
            cx.fillStyle=lc[i%4];
            cx.beginPath();cx.arc(l.dx,l.dy,l.r,0,Math.PI*2);cx.fill();
        });
        // 잎 하이라이트
        cx.fillStyle='rgba(100,200,80,0.22)';
        cx.beginPath();cx.ellipse(-6,-68,10,7,-0.4,0,Math.PI*2);cx.fill();
        // 귤 열매
        [{dx:-12,dy:-48},{dx:8,dy:-44},{dx:-4,dy:-56},
         {dx:14,dy:-58},{dx:-16,dy:-60},{dx:5,dy:-68}
        ].forEach(f=>{
            cx.fillStyle='#FF8C00';
            cx.beginPath();cx.arc(f.dx,f.dy,7,0,Math.PI*2);cx.fill();
            cx.beginPath();cx.ellipse(f.dx,f.dy-5,3,3,0,0,Math.PI*2);cx.fill();
            cx.fillStyle='#228B22';
            cx.beginPath();cx.ellipse(f.dx+3,f.dy-8,5,3,Math.PI/5,0,Math.PI*2);cx.fill();
            cx.fillStyle='rgba(255,255,255,0.38)';
            cx.beginPath();cx.ellipse(f.dx-2,f.dy-2,3,2,-0.3,0,Math.PI*2);cx.fill();
        });
        cx.restore();
    }

    /* ─── 돌고래 그리기 ─── */
    _drawDolphins(cx){
        this.dolphins.forEach(d=>{
            if(!d.active)return;
            const jumpH=this.H*.16*d.size;
            const seaY=this.baseY+6;
            const t=d.phase/Math.PI;            // 0→1
            const yOff=Math.sin(d.phase)*jumpH;
            const bx=d.x+(t-.5)*60;            // 수평 이동
            const dy=seaY-yOff;

            // 회전: 상승 시 앞 기울기, 하강 시 뒤 기울기
            const rot = t < 0.5
                ? -Math.PI*0.28*(1-t*2)        // 올라갈 때: 머리 위로
                :  Math.PI*0.32*(t*2-1);        // 내려갈 때: 머리 아래로

            const sc=d.size*1.1;
            cx.save();
            cx.translate(bx, dy);
            cx.rotate(rot);
            cx.scale(sc, sc);
            const isPink = this.pinkDolphins;

            // ── 꼬리 지느러미 (이분지 꼬리 — 실제 돌고래 특징)
            cx.fillStyle= isPink ? '#c0185a' : '#17607a';
            cx.beginPath();
            cx.moveTo(-32, 0);
            cx.bezierCurveTo(-40,-2,-48,-14,-46,-20);
            cx.bezierCurveTo(-44,-24,-38,-16,-32,-10);
            cx.lineTo(-32,0);cx.fill();
            cx.fillStyle= isPink ? '#c0185a' : '#17607a';
            cx.beginPath();
            cx.moveTo(-32, 0);
            cx.bezierCurveTo(-40, 2,-48, 14,-46, 20);
            cx.bezierCurveTo(-44, 24,-38, 16,-32, 10);
            cx.lineTo(-32,0);cx.fill();

            // ── 몸통 (유선형 — 앞이 두껍고 뒤가 가늘어짐)
            const bodyG=cx.createLinearGradient(0,-14,0,14);
            bodyG.addColorStop(0, isPink ? '#ff9ecd' : '#5ac8e0');
            bodyG.addColorStop(0.4, isPink ? '#ff6aaa' : '#2da8c8');
            bodyG.addColorStop(1, isPink ? '#e0408a' : '#1a7898');
            cx.fillStyle=bodyG;
            cx.beginPath();
            cx.moveTo(30,0);                          // 주둥이 끝
            cx.bezierCurveTo(24,-3, 10,-13, -5,-12); // 등 라인
            cx.bezierCurveTo(-18,-11,-28,-6,-32,0);  // 꼬리자루
            cx.bezierCurveTo(-28, 6,-18, 11, -5, 12);
            cx.bezierCurveTo(10,  13, 24,  3, 30,  0);
            cx.closePath();cx.fill();

            // ── 배 (밝은 흰색)
            cx.fillStyle= isPink ? 'rgba(255,230,240,0.75)' : 'rgba(220,248,255,0.75)';
            cx.beginPath();
            cx.moveTo(28,0);
            cx.bezierCurveTo(22, 2, 8, 9,  -6, 9);
            cx.bezierCurveTo(-18, 9,-26, 5,-30, 0);
            cx.bezierCurveTo(-26,-2,-6, 3, 28, 0);
            cx.fill();

            // ── 등지느러미 (S커브 — 실제 돌고래처럼)
            cx.fillStyle= isPink ? '#c0185a' : '#17607a';
            cx.beginPath();
            cx.moveTo(-2,-12);
            cx.bezierCurveTo(2,-12, 8,-30, 4,-32);
            cx.bezierCurveTo(0,-34,-4,-28,-8,-18);
            cx.bezierCurveTo(-6,-15,-4,-13,-2,-12);
            cx.fill();

            // ── 가슴지느러미 (측면)
            cx.fillStyle= isPink ? '#e0408a' : '#1e88a8';
            cx.beginPath();
            cx.moveTo(8, 6);
            cx.bezierCurveTo(4,10,-4,20,-8,18);
            cx.bezierCurveTo(-6,14, 2, 8, 8, 6);
            cx.fill();

            // ── 주둥이 (뾰족하게)
            cx.fillStyle='#2da8c8';
            cx.beginPath();
            cx.moveTo(30,0);
            cx.bezierCurveTo(34,-1,40,-2,44,0);
            cx.bezierCurveTo(40, 2,34, 1,30,0);
            cx.fill();

            // ── 눈 (흰 공막 + 검은 동공 + 반짝임)
            cx.fillStyle='rgba(255,255,255,0.9)';
            cx.beginPath();cx.ellipse(20,-5,4,3,-.2,0,Math.PI*2);cx.fill();
            cx.fillStyle='#111';
            cx.beginPath();cx.arc(21,-5,2,0,Math.PI*2);cx.fill();
            cx.fillStyle='rgba(255,255,255,0.9)';
            cx.beginPath();cx.arc(22,-6,0.8,0,Math.PI*2);cx.fill();

            // ── 입 (미소 라인)
            cx.strokeStyle='rgba(0,80,100,0.5)';cx.lineWidth=1;
            cx.beginPath();cx.moveTo(32,1);cx.bezierCurveTo(30,3,24,4,18,2);cx.stroke();

            // ── 몸 광택 하이라이트
            cx.fillStyle='rgba(255,255,255,0.22)';
            cx.beginPath();cx.ellipse(8,-8,14,4,-.3,0,Math.PI*2);cx.fill();

            cx.restore();

            // ── 입수·출수 물보라 (해수면에서만)
            if((t<0.12||t>0.88) && yOff<jumpH*0.25){
                cx.save();cx.translate(bx,seaY);
                cx.fillStyle='rgba(255,255,255,0.7)';
                for(let i=0;i<5;i++){
                    const sx=(i-2)*12+Math.sin(i*1.8)*4;
                    const sy=-Math.abs(Math.sin(i*0.8))*16-2;
                    cx.beginPath();cx.ellipse(sx,sy,3+Math.random()*2,2+Math.random(),0,0,Math.PI*2);cx.fill();
                }
                // 잔물결
                cx.strokeStyle='rgba(180,230,255,0.45)';cx.lineWidth=1.5;
                for(let r=1;r<=3;r++){
                    cx.beginPath();cx.ellipse(0,0,r*14,r*4,0,0,Math.PI*2);cx.stroke();
                }
                cx.restore();
            }
        });
    }

    _drawPlatform(cx,pl){
        const x=pl.x,y=pl.y,w=pl.w,h=this.pH;
        // grass
        const gg=cx.createLinearGradient(0,y,0,y+h);
        gg.addColorStop(0,'#5DBB4B');gg.addColorStop(.4,'#4CAF50');gg.addColorStop(1,'#3d8840');
        cx.fillStyle=gg;cx.fillRect(x,y,w,h);
        cx.fillStyle='#7DD96A';cx.fillRect(x,y,w,3);
        // dirt
        const dg=cx.createLinearGradient(0,y+h,0,y+h+50);
        dg.addColorStop(0,'#8B5E3C');dg.addColorStop(1,'#5a3518');
        cx.fillStyle=dg;cx.fillRect(x,y+h,w,50);
        cx.fillStyle='rgba(0,0,0,.1)';
        for(let i=0;i<Math.floor(w/20);i++){cx.fillRect(x+i*20+4,y+h+7,5,3);cx.fillRect(x+i*20+12,y+h+16,4,2);}
        // edges
        cx.fillStyle='#3d8840';cx.fillRect(x,y,3,h);cx.fillRect(x+w-3,y,3,h);
    }

    _drawHallabong(cx,x,y,r){
        cx.fillStyle='#FF8C00';
        cx.beginPath();cx.ellipse(x,y,r,r*.92,0,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(x,y-r*.68,r*.4,r*.36,0,0,Math.PI*2);cx.fill();
        cx.fillStyle='#228B22';cx.beginPath();cx.ellipse(x+2,y-r-3,7,4,Math.PI/5,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,255,255,.35)';cx.beginPath();cx.ellipse(x-r*.28,y-r*.22,r*.26,r*.2,-.5,0,Math.PI*2);cx.fill();
        cx.strokeStyle='rgba(0,0,0,.12)';cx.lineWidth=1.5;cx.beginPath();cx.ellipse(x,y,r,r*.92,0,0,Math.PI*2);cx.stroke();
    }

    _drawGiantHallabong(cx,x,y,r){
        cx.save();
        // 빛나는 아우라 (거대 한라봉 강조)
        const aura = cx.createRadialGradient(x,y,r*0.6, x,y,r*2.2);
        aura.addColorStop(0,'rgba(255,160,0,0.35)');
        aura.addColorStop(0.5,'rgba(255,100,0,0.15)');
        aura.addColorStop(1,'rgba(255,80,0,0)');
        cx.fillStyle=aura;
        cx.beginPath();cx.arc(x,y,r*2.2,0,Math.PI*2);cx.fill();

        // 반짝이는 별 효과 (4방향)
        const starT = this.bgT * 3;
        cx.fillStyle='rgba(255,230,80,0.85)';
        [[0,-1],[1,0],[0,1],[-1,0]].forEach(([dx,dy],i)=>{
            const pulse = 0.5 + 0.5*Math.abs(Math.sin(starT+i*Math.PI/2));
            const sd = r*1.6*pulse;
            cx.fillStyle=`rgba(255,220,50,${0.7*pulse})`;
            cx.beginPath();
            cx.moveTo(x+dx*sd, y+dy*sd);
            cx.lineTo(x+dx*(sd-6)+dy*4, y+dy*(sd-6)+dx*4);
            cx.lineTo(x+dx*(sd*0.4), y+dy*(sd*0.4));
            cx.lineTo(x+dx*(sd-6)-dy*4, y+dy*(sd-6)-dx*4);
            cx.closePath();cx.fill();
        });

        // 본체 (일반 한라봉과 동일한 형태, 크게)
        const bodyG = cx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1, x,y,r*1.1);
        bodyG.addColorStop(0,'#FFCC00');
        bodyG.addColorStop(0.4,'#FF9500');
        bodyG.addColorStop(0.8,'#FF7000');
        bodyG.addColorStop(1,'#E05000');
        cx.fillStyle=bodyG;
        cx.beginPath();cx.ellipse(x,y,r,r*.92,0,0,Math.PI*2);cx.fill();
        // 상단 돌기
        cx.fillStyle='#FF8C00';
        cx.beginPath();cx.ellipse(x,y-r*.68,r*.4,r*.36,0,0,Math.PI*2);cx.fill();
        // 잎
        cx.fillStyle='#228B22';
        cx.beginPath();cx.ellipse(x+4,y-r-6,12,7,Math.PI/5,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(x-4,y-r-5,10,6,-Math.PI/5,0,Math.PI*2);cx.fill();
        // 하이라이트
        cx.fillStyle='rgba(255,255,255,.45)';
        cx.beginPath();cx.ellipse(x-r*.28,y-r*.22,r*.3,r*.22,-.5,0,Math.PI*2);cx.fill();
        // 윤곽
        cx.strokeStyle='rgba(160,60,0,.5)';cx.lineWidth=3;
        cx.beginPath();cx.ellipse(x,y,r,r*.92,0,0,Math.PI*2);cx.stroke();

        // +10 플로팅 텍스트
        cx.fillStyle='#FFD700';
        cx.font=`bold ${Math.round(r*0.55)}px "Press Start 2P",monospace`;
        cx.textAlign='center';cx.textBaseline='middle';
        cx.shadowColor='rgba(255,100,0,0.8)';cx.shadowBlur=8;
        cx.fillText('+10',x,y+r+18);
        cx.shadowBlur=0;
        cx.restore();
    }

    _drawTurtle(cx,en){
        const flip=en.dir>0?1:-1;
        cx.save();cx.translate(en.x,en.y+en.h/2);cx.scale(flip,1);cx.translate(-en.w/2,-en.h/2);
        const lm=en.frame===0?0:5;
        cx.fillStyle='#2E7D32';
        cx.fillRect(4-lm,22,12,14);cx.fillRect(36+lm,22,12,14);cx.fillRect(8,0,10,11);cx.fillRect(34,0,10,11);
        const sg=cx.createRadialGradient(26,18,2,26,18,22);
        sg.addColorStop(0,'#66BB6A');sg.addColorStop(.6,'#4CAF50');sg.addColorStop(1,'#2E7D32');
        cx.fillStyle=sg;cx.beginPath();cx.ellipse(26,18,24,17,0,0,Math.PI*2);cx.fill();
        // ── 붉은 외곽선 ──
        cx.strokeStyle='#E53935';cx.lineWidth=3;
        cx.beginPath();cx.ellipse(26,18,24,17,0,0,Math.PI*2);cx.stroke();
        cx.fillStyle='#388E3C';cx.beginPath();cx.arc(26,18,11,0,Math.PI*2);cx.fill();
        cx.fillStyle='#2E7D32';
        for(let i=0;i<6;i++){const a=i/6*Math.PI*2;cx.beginPath();cx.arc(26+Math.cos(a)*17,18+Math.sin(a)*12,4.5,0,Math.PI*2);cx.fill();}
        cx.fillStyle='#2E7D32';cx.beginPath();cx.ellipse(53,18,9,7,0,0,Math.PI*2);cx.fill();
        cx.fillStyle='#111';cx.fillRect(56,15,3,3);
        cx.restore();
    }

    _drawOctopus(cx,en){
        const x=en.x-en.w/2,y=en.y;
        const b=en.frame===0?0:3;
        const bg=cx.createRadialGradient(x+23,y+14-b,2,x+23,y+14-b,20);
        bg.addColorStop(0,'#F06292');bg.addColorStop(1,'#C2185B');
        cx.fillStyle=bg;cx.beginPath();cx.ellipse(x+23,y+15-b,21,17,0,0,Math.PI*2);cx.fill();
        cx.strokeStyle='#AD1457';cx.lineWidth=5;
        const lOff=en.frame===0?0:5;
        for(let i=0;i<4;i++){const lx=x+7+i*12;cx.beginPath();cx.moveTo(lx,y+24);cx.quadraticCurveTo(lx+(i%2===0?lOff:-lOff),y+38,lx,y+50);cx.stroke();}
        cx.fillStyle='#fff';cx.fillRect(x+14,y+8,8,9);cx.fillRect(x+25,y+8,8,9);
        cx.fillStyle='#111';cx.fillRect(x+16,y+11,4,5);cx.fillRect(x+27,y+11,4,5);
        cx.fillStyle='#fff';cx.fillRect(x+17,y+11,2,2);cx.fillRect(x+28,y+11,2,2);
        cx.fillStyle='rgba(255,100,120,.4)';
        cx.beginPath();cx.ellipse(x+12,y+21,5,3,0,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(x+34,y+21,5,3,0,0,Math.PI*2);cx.fill();
    }

    _drawKingHallabong(cx,x,y,r){
        cx.save();
        // 왕관 빛 아우라
        const aura=cx.createRadialGradient(x,y,r*0.5,x,y,r*3);
        aura.addColorStop(0,'rgba(255,215,0,0.5)');
        aura.addColorStop(0.4,'rgba(255,150,0,0.2)');
        aura.addColorStop(1,'rgba(255,100,0,0)');
        cx.fillStyle=aura;cx.beginPath();cx.arc(x,y,r*3,0,Math.PI*2);cx.fill();

        // 별 8방향 (크게 반짝)
        const starT=this.bgT*2.5;
        for(let i=0;i<8;i++){
            const a=(i/8)*Math.PI*2+starT;
            const pulse=0.5+0.5*Math.abs(Math.sin(starT+i));
            const sd=r*1.8*pulse;
            cx.fillStyle=`rgba(255,230,0,${0.75*pulse})`;
            cx.beginPath();
            cx.moveTo(x+Math.cos(a)*sd, y+Math.sin(a)*sd);
            cx.lineTo(x+Math.cos(a+0.25)*(sd*0.35), y+Math.sin(a+0.25)*(sd*0.35));
            cx.lineTo(x+Math.cos(a+0.5)*(sd*0.7), y+Math.sin(a+0.5)*(sd*0.7));
            cx.lineTo(x+Math.cos(a-0.25)*(sd*0.35), y+Math.sin(a-0.25)*(sd*0.35));
            cx.closePath();cx.fill();
        }

        // 몸체
        const bG=cx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.05,x,y,r*1.1);
        bG.addColorStop(0,'#FFEE55');bG.addColorStop(0.35,'#FFB300');bG.addColorStop(0.7,'#FF8000');bG.addColorStop(1,'#E05000');
        cx.fillStyle=bG;cx.beginPath();cx.ellipse(x,y,r,r*0.92,0,0,Math.PI*2);cx.fill();
        // 돌기
        cx.fillStyle='#FF9500';cx.beginPath();cx.ellipse(x,y-r*0.68,r*0.4,r*0.36,0,0,Math.PI*2);cx.fill();
        // 잎
        cx.fillStyle='#1B8800';cx.beginPath();cx.ellipse(x+5,y-r-8,14,8,Math.PI/5,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(x-5,y-r-7,12,7,-Math.PI/5,0,Math.PI*2);cx.fill();
        // 하이라이트
        cx.fillStyle='rgba(255,255,255,0.4)';cx.beginPath();cx.ellipse(x-r*0.28,y-r*0.22,r*0.32,r*0.24,-0.5,0,Math.PI*2);cx.fill();
        // 윤곽
        cx.strokeStyle='rgba(160,60,0,0.5)';cx.lineWidth=3.5;cx.beginPath();cx.ellipse(x,y,r,r*0.92,0,0,Math.PI*2);cx.stroke();

        // 왕관
        const crX=x, crY=y-r-10;
        cx.fillStyle='#FFD700';
        cx.strokeStyle='#B8860B';cx.lineWidth=2;
        cx.beginPath();
        cx.moveTo(crX-28,crY+10);
        cx.lineTo(crX-28,crY-8);
        cx.lineTo(crX-16,crY+2);
        cx.lineTo(crX,crY-16);
        cx.lineTo(crX+16,crY+2);
        cx.lineTo(crX+28,crY-8);
        cx.lineTo(crX+28,crY+10);
        cx.closePath();cx.fill();cx.stroke();
        // 왕관 보석
        [crX-28,crX,crX+28].forEach(bx=>{
            cx.fillStyle='#FF1744';cx.beginPath();cx.arc(bx,crY+10,4,0,Math.PI*2);cx.fill();
        });
        cx.fillStyle='#AA00FF';cx.beginPath();cx.arc(crX,crY-16,5,0,Math.PI*2);cx.fill();

        // +50 텍스트
        cx.fillStyle='#FFD700';
        cx.font=`bold ${Math.round(r*0.45)}px "Press Start 2P",monospace`;
        cx.textAlign='center';cx.textBaseline='middle';
        cx.shadowColor='rgba(255,50,0,0.9)';cx.shadowBlur=10;
        cx.fillText('+50',x,y+r+22);cx.shadowBlur=0;
        cx.restore();
    }

    _drawFireworks(cx){
        if(!this.fireworks||!this.fireworks.length) return;
        this.fireworks.forEach(p=>{
            const alpha = Math.max(0, p.life/p.maxLife);
            cx.save();
            cx.globalAlpha = alpha;
            cx.fillStyle = p.color;
            cx.shadowColor = p.color;
            cx.shadowBlur = 4;
            cx.beginPath();
            cx.arc(p.x, p.y, p.size*(0.5+alpha*0.5), 0, Math.PI*2);
            cx.fill();
            cx.restore();
        });
        cx.globalAlpha=1;cx.shadowBlur=0;
    }

    _drawDol(cx,x,y,w,h,vy){
        const tilt=Math.max(-0.18,Math.min(0.18,vy*.012));
        cx.save();cx.translate(x+w/2,y+h/2);cx.rotate(tilt);
        const s=w/44;cx.scale(s,s);
        // 그림자
        cx.fillStyle='rgba(0,0,0,.14)';cx.beginPath();cx.ellipse(0,29+10,15,5,0,0,Math.PI*2);cx.fill();
        // 몸통
        cx.fillStyle='#686868';cx.fillRect(-14,10,28,32);
        cx.fillStyle='#555';cx.fillRect(-8,14,16,24);
        // 머리
        cx.fillStyle='#787878';cx.beginPath();cx.ellipse(0,-1,22,25,0,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(0,0,0,.07)';cx.beginPath();cx.ellipse(7,3,11,17,-.15,0,Math.PI*2);cx.fill();
        // 모자 챙
        cx.fillStyle='#1a1a1a';cx.fillRect(-24,-22,48,12);cx.fillRect(-13,-31,26,10);cx.fillStyle='#2e2e2e';cx.fillRect(-24,-22,48,3);
        // 눈
        cx.fillStyle='#d8d8d8';cx.fillRect(-13,5,10,10);cx.fillRect(3,5,10,10);
        cx.fillStyle='#111';cx.fillRect(-10,8,4,6);cx.fillRect(6,8,4,6);
        cx.fillStyle='#fff';cx.fillRect(-9,8,2,2);cx.fillRect(7,8,2,2);
        // 코
        cx.fillStyle='#555';cx.fillRect(-4,16,8,12);cx.fillStyle='#333';cx.fillRect(-3,22,2,3);cx.fillRect(1,22,2,3);
        // 입
        cx.fillStyle='#222';cx.fillRect(-6,29,12,4);
        // 팔
        cx.fillStyle='#686868';cx.fillRect(-29,17,16,16);cx.fillRect(13,17,16,16);
        cx.beginPath();cx.arc(-21,35,7,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.arc(21,35,7,0,Math.PI*2);cx.fill();
        // ── ASNP 문구 (몸통 중앙) ──
        cx.save();
        // 각인된 판 (돌 위에 새긴 느낌)
        cx.fillStyle='rgba(0,0,0,0.28)';
        cx.fillRect(-14,13,28,16);
        cx.fillStyle='rgba(255,255,255,0.08)';
        cx.fillRect(-14,13,28,2);
        // 외곽선 (검은 테두리) — 가독성 확보
        cx.strokeStyle='rgba(0,0,0,0.9)';
        cx.lineWidth=3;
        cx.font='bold 9px "Press Start 2P", monospace';
        cx.textAlign='center';
        cx.textBaseline='middle';
        cx.strokeText('ASNP',0,21);
        // 황금색 본문
        cx.fillStyle='#FFD700';
        cx.shadowColor='rgba(255,180,0,0.8)';
        cx.shadowBlur=4;
        cx.fillText('ASNP',0,21);
        cx.shadowBlur=0;
        cx.restore();
        cx.restore();
    }
}

/* ══ DB ══ */
const DB='np10_scores';
function saveScore(email,score){const d=JSON.parse(localStorage.getItem(DB)||'[]');d.push({email,score,date:new Date().toLocaleString('ko-KR')});localStorage.setItem(DB,JSON.stringify(d));}
function topScores(){const d=JSON.parse(localStorage.getItem(DB)||'[]');const b={};d.forEach(r=>{if(!b[r.email]||r.score>b[r.email].score)b[r.email]=r;});return Object.values(b).sort((a,c)=>c.score-a.score).slice(0,10);}
function downloadCSV(){
    const all=JSON.parse(localStorage.getItem(DB)||'[]');
    if(!all.length){alert('저장된 기록이 없습니다.');return;}
    const b={};all.forEach(r=>{if(!b[r.email]||r.score>b[r.email].score)b[r.email]=r;});
    const rows=Object.values(b).sort((a,c)=>c.score-a.score);
    const csv='\uFEFF순위,이메일,점수,날짜\n'+rows.map((r,i)=>`${i+1},${r.email},${r.score},${r.date}`).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download=`NATPRO10_ranking_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function maskEmail(e){const[l,d]=(e||'').split('@');return(l.length<=2?l[0]:l.slice(0,2))+'***@'+(d||'');}

/* ══ APP ══ */
class App{
    constructor(){
        this.email='';this.game=null;this.bg=null;
        this.screens={title:document.getElementById('title-screen'),email:document.getElementById('email-screen'),game:document.getElementById('game-screen'),ranking:document.getElementById('ranking-screen')};
        this._bind();this._show('title');
        this.bg=new TitleBG(document.getElementById('title-canvas'));this.bg.animate();
        document.getElementById('best').textContent=localStorage.getItem('np10_best')||0;
    }
    _bind(){
        const tc=e=>{if(e.target.id==='snd-btn')return;e.preventDefault();this._toEmail();};
        this.screens.title.addEventListener('click',tc);
        this.screens.title.addEventListener('touchstart',tc,{passive:false});
        document.getElementById('snd-btn').addEventListener('click',e=>{
            e.stopPropagation();sfx.init();
            const muted=sfx.toggleMute();
            document.getElementById('snd-btn').textContent=muted?'🔇':'🔊';
            // 음소거 해제 시 게임 중이면 BGM 재시작
            if(!muted && this.game && !this.game.dead) sfx.startBGM();
        });
        document.getElementById('start-btn').addEventListener('click',()=>this._submit());
        document.getElementById('email-input').addEventListener('keypress',e=>{if(e.key==='Enter')this._submit();});
        document.getElementById('restart-btn').addEventListener('click',()=>this._show('email'));
        document.getElementById('dl-btn').addEventListener('click',downloadCSV);
    }
    _toEmail(){sfx.init();sfx.resume();if(this.bg){this.bg.stop();this.bg=null;}this._show('email');setTimeout(()=>document.getElementById('email-input').focus(),320);}
    _submit(){
        const v=document.getElementById('email-input').value.trim(),err=document.getElementById('email-err');
        if(!v){err.textContent='이메일을 입력해주세요';return;}
        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){err.textContent='올바른 이메일 형식이 아닙니다';return;}
        err.textContent='';this.email=v;this._startGame();
    }
    _startGame(){
        this._show('game');
        document.getElementById('score').textContent='0';
        document.getElementById('best').textContent=localStorage.getItem('np10_best')||0;
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
            if(this.game)this.game.stop();
            this.game=new PlatformGame(document.getElementById('game-canvas'));
            this.game.onGameOver=score=>this._gameOver(score);
            sfx.stopBGM();
            this._countdown(()=>{
                this.game.start();
                sfx.startBGM();
            });
        }));
    }
    _countdown(cb){
        const ov=document.getElementById('cntdwn'),num=document.getElementById('cntdwn-n');
        ov.style.display='flex';let n=3;num.textContent=n;
        const tick=()=>{num.style.animation='none';void num.offsetWidth;num.style.animation='cPop .7s ease-out forwards';n--;if(n>0){num.textContent=n;setTimeout(tick,700);}else{ov.style.display='none';cb();}};
        setTimeout(tick,700);
    }
    _gameOver(score){
        sfx.stopBGM();
        saveScore(this.email,score);document.getElementById('final-score').textContent=score;this._renderRanking(score);this._show('ranking');
    }
    _renderRanking(cur){
        const top=topScores(),list=document.getElementById('rank-list');list.innerHTML='';
        if(!top.length){list.innerHTML='<p style="color:#555;font-size:9px;text-align:center;padding:14px">아직 기록이 없습니다</p>';return;}
        const m=['🥇','🥈','🥉'];
        top.forEach((r,i)=>{const el=document.createElement('div');el.className='rank-item'+(r.email===this.email&&r.score===cur?' me':'');el.innerHTML=`<span class="pos">${m[i]||i+1}</span><span class="em">${maskEmail(r.email)}</span><span class="sc">${r.score}</span>`;list.appendChild(el);});
    }
    _show(n){Object.values(this.screens).forEach(s=>s.classList.remove('active'));this.screens[n].classList.add('active');}
}
document.addEventListener('DOMContentLoaded',()=>new App());
</script>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ASNP NATPRO10 in JEJU island</title>
  <meta name="description" content="Jeju-themed web game playable on desktop and mobile." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-card">
      <header class="hud">
        <div>
          <p class="eyebrow">8-bit Retro Jeju Game</p>
          <h1>ASNP NATPRO10 in JEJU island</h1>
        </div>
        <div class="hud-stats">
          <div class="stat"><span>점수</span><strong id="score">0</strong></div>
          <div class="stat"><span>남은 시간</span><strong id="timer">45</strong></div>
          <div class="stat"><span>최고 점수</span><strong id="bestScore">0</strong></div>
        </div>
      </header>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="960" height="540" aria-label="Game canvas"></canvas>

        <div id="startOverlay" class="overlay show">
          <div class="overlay-panel">
            <p class="overlay-badge">JEJU RETRO STAGE</p>
            <h2>ASNP NATPRO10 in JEJU island</h2>
            <p class="overlay-copy">
              제주 바다를 배경으로 돌하르방을 던져 해양 생물을 맞히세요.<br />
              모바일에서는 화면을 터치하고, PC에서는 클릭 또는 스페이스바를 사용하세요.
            </p>
            <p id="blinkText" class="blink">TOUCH TO THROW</p>
            <button id="startBtn" class="primary-btn">게임 시작</button>
          </div>
        </div>

        <div id="gameOverOverlay" class="overlay">
          <div class="overlay-panel">
            <p class="overlay-badge">GAME OVER</p>
            <h2>수고하셨습니다</h2>
            <p class="overlay-copy">최종 점수: <strong id="finalScore">0</strong></p>
            <div class="button-row">
              <button id="restartBtn" class="primary-btn">다시 시작</button>
              <button id="muteBtn" class="secondary-btn">사운드 끄기</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="game-footer">
        <p>조작: 터치 / 클릭 / 스페이스바</p>
        <p><a href="admin.html">관리자 페이지</a> · GitHub Pages 배포 가능</p>
      </footer>
    </section>
  </main>

  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

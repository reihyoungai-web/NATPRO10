<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 | ASNP NATPRO10</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="admin-shell">
    <p class="eyebrow">ADMIN</p>
    <h1>ASNP NATPRO10 in JEJU island</h1>
    <p>이 페이지에서는 로컬 저장소에 저장된 최고 점수를 확인하고 초기화할 수 있습니다.</p>

    <section class="admin-box">
      <h2>현재 최고 점수</h2>
      <p><strong id="bestScore">0</strong></p>
      <div class="button-row">
        <button id="resetBtn" class="primary-btn">최고 점수 초기화</button>
        <a class="secondary-btn" href="index.html">게임으로 돌아가기</a>
      </div>
    </section>
  </main>

  <script>
    const bestEl = document.getElementById('bestScore');
    const resetBtn = document.getElementById('resetBtn');
    const read = () => {
      bestEl.textContent = String(Number(localStorage.getItem('natpro10-best-score') || 0));
    };
    resetBtn.addEventListener('click', () => {
      localStorage.removeItem('natpro10-best-score');
      read();
      alert('최고 점수를 초기화했습니다.');
    });
    read();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASNP NATPRO10 - 관리자 페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #FFD700;
            font-size: clamp(14px, 3vw, 24px);
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #8B4513;
        }
        
        .admin-card {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #FFD700;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .admin-card h2 {
            color: #98FB98;
            font-size: clamp(10px, 2vw, 16px);
            margin-bottom: 15px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: rgba(74, 144, 164, 0.3);
            border: 2px solid #4a90a4;
            padding: 15px;
            text-align: center;
        }
        
        .stat-box .label {
            font-size: 10px;
            color: #98FB98;
            margin-bottom: 10px;
        }
        
        .stat-box .value {
            font-size: 24px;
            color: #FFD700;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .pixel-button {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 12px 20px;
            background: linear-gradient(to bottom, #FF6B35 0%, #D32F2F 100%);
            border: 3px solid #8B4513;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #333;
        }
        
        .pixel-button:hover {
            transform: scale(1.05);
            background: linear-gradient(to bottom, #FF8C5A 0%, #E53935 100%);
        }
        
        .pixel-button.secondary {
            background: linear-gradient(to bottom, #4a90a4 0%, #2c5f7c 100%);
            border-color: #1e5f74;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 2px dashed #333;
        }
        
        th {
            color: #FFD700;
            background: rgba(0, 0, 0, 0.5);
        }
        
        td {
            color: #fff;
        }
        
        tr:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 8px 15px;
            background: #333;
            border: 2px solid #FFD700;
            color: #FFD700;
            cursor: pointer;
        }
        
        .page-btn:hover, .page-btn.active {
            background: #FFD700;
            color: #333;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #98FB98;
            font-size: 12px;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 12px;
        }
        
        .back-link {
            display: inline-block;
            color: #98FB98;
            text-decoration: none;
            font-size: 10px;
            margin-bottom: 20px;
        }
        
        .back-link:hover {
            color: #FFD700;
        }
        
        @media (max-width: 600px) {
            table {
                font-size: 8px;
            }
            
            th, td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 게임으로 돌아가기</a>
        
        <h1>🎮 ASNP NATPRO10<br>관리자 대시보드</h1>
        
        <!-- 통계 -->
        <div class="admin-card">
            <h2>📊 게임 통계</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="label">총 플레이 횟수</div>
                    <div class="value" id="total-plays">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">고유 플레이어 수</div>
                    <div class="value" id="unique-players">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">최고 점수</div>
                    <div class="value" id="highest-score">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">평균 점수</div>
                    <div class="value" id="avg-score">-</div>
                </div>
            </div>
        </div>
        
        <!-- 데이터 내보내기 -->
        <div class="admin-card">
            <h2>📁 데이터 내보내기</h2>
            <div class="button-group">
                <button class="pixel-button" onclick="downloadCSV()">CSV 다운로드</button>
                <button class="pixel-button secondary" onclick="downloadJSON()">JSON 다운로드</button>
            </div>
            <p style="font-size: 9px; color: #666; margin-top: 10px;">
                * 다운로드한 파일을 Excel에서 열 수 있습니다
            </p>
        </div>
        
        <!-- 플레이어 목록 -->
        <div class="admin-card">
            <h2>🏆 플레이어 기록</h2>
            <div id="player-table-container">
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <script>
        let allData = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        
        // 페이지 로드 시 데이터 가져오기
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllData();
            updateStats();
            renderTable();
        });
        
        async function loadAllData() {
            try {
                const response = await fetch('tables/players?limit=10000&sort=-score');
                const result = await response.json();
                allData = result.data || [];
            } catch (error) {
                console.error('Error loading data:', error);
                allData = [];
            }
        }
        
        function updateStats() {
            const totalPlays = allData.length;
            const uniqueEmails = new Set(allData.map(d => d.email)).size;
            const highestScore = allData.length > 0 ? Math.max(...allData.map(d => d.score)) : 0;
            const avgScore = allData.length > 0 
                ? Math.round(allData.reduce((sum, d) => sum + d.score, 0) / allData.length) 
                : 0;
            
            document.getElementById('total-plays').textContent = totalPlays;
            document.getElementById('unique-players').textContent = uniqueEmails;
            document.getElementById('highest-score').textContent = highestScore;
            document.getElementById('avg-score').textContent = avgScore;
        }
        
        function renderTable() {
            const container = document.getElementById('player-table-container');
            
            if (allData.length === 0) {
                container.innerHTML = '<div class="no-data">아직 기록된 데이터가 없습니다</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            const totalPages = Math.ceil(allData.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = allData.slice(startIndex, endIndex);
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>이메일</th>
                            <th>점수</th>
                            <th>플레이 시간</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            pageData.forEach((record, index) => {
                const rank = startIndex + index + 1;
                let rankClass = '';
                let rankDisplay = rank;
                
                if (rank === 1) {
                    rankClass = 'rank-1';
                    rankDisplay = '🥇 1';
                } else if (rank === 2) {
                    rankClass = 'rank-2';
                    rankDisplay = '🥈 2';
                } else if (rank === 3) {
                    rankClass = 'rank-3';
                    rankDisplay = '🥉 3';
                }
                
                const playedAt = new Date(record.played_at || record.created_at);
                const dateStr = playedAt.toLocaleString('ko-KR');
                
                html += `
                    <tr>
                        <td class="${rankClass}">${rankDisplay}</td>
                        <td>${record.email}</td>
                        <td>${record.score}</td>
                        <td>${dateStr}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            
            // 페이지네이션
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            html += `<button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>≪</button>`;
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>`;
            html += `<button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>≫</button>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(allData.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }
        
        function downloadCSV() {
            if (allData.length === 0) {
                alert('다운로드할 데이터가 없습니다');
                return;
            }
            
            // BOM 추가 (Excel에서 한글 깨짐 방지)
            let csv = '\uFEFF';
            csv += '순위,이메일,점수,플레이시간\n';
            
            allData.forEach((record, index) => {
                const playedAt = new Date(record.played_at || record.created_at);
                const dateStr = playedAt.toLocaleString('ko-KR');
                csv += `${index + 1},"${record.email}",${record.score},"${dateStr}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            const now = new Date();
            const filename = `ASNP_NATPRO10_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.csv`;
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function downloadJSON() {
            if (allData.length === 0) {
                alert('다운로드할 데이터가 없습니다');
                return;
            }
            
            const exportData = allData.map((record, index) => ({
                rank: index + 1,
                email: record.email,
                score: record.score,
                played_at: record.played_at || record.created_at
            }));
            
            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            const now = new Date();
            const filename = `ASNP_NATPRO10_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.json`;
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
